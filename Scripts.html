<script>
  function formToObject(form) {
    const data = {};
    Array.prototype.forEach.call(form.elements, function(el) {
      if (!el.name) return;
      data[el.name] = el.type === 'checkbox' ? el.checked : el.value;
    });
    return data;
  }

  function setMessage(id, text, isError) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || '';
    el.className = isError ? 'message error' : 'message';
  }

  function loginClienteUi() {
    setMessage('loginMensaje', 'Validando acceso...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('loginMensaje', res && res.mensaje ? res.mensaje : 'No se pudo ingresar.', true);
          return;
        }
        sessionStorage.setItem('portalCliente', JSON.stringify(res.cliente));
        window.location.search = '?app=cliente';
      })
      .withFailureHandler(function(error) {
        setMessage('loginMensaje', error.message || String(error), true);
      })
      .loginCliente(
        document.getElementById('loginCuit').value,
        document.getElementById('loginEmail').value,
        document.getElementById('loginClave').value
      );
  }

  function iniciarPortalCliente() {
    const raw = sessionStorage.getItem('portalCliente');
    if (!raw) {
      window.location.search = '';
      return;
    }

    const cliente = JSON.parse(raw);
    document.getElementById('clienteNombre').textContent = cliente.nombreFantasia || cliente.razonSocial || 'Cliente';
    document.getElementById('clienteDetalle').textContent = cliente.cuit + ' - ' + cliente.email;
    cargarBloqueCliente('listaPublicaciones', 'obtenerPublicacionesCliente', cliente.idPortalCliente, cliente.token, renderPublicacion);
    cargarBloqueCliente('listaMonitoreos', 'obtenerMonitoreosCliente', cliente.idPortalCliente, cliente.token, renderMonitoreo);
    cargarBloqueCliente('listaDocumentos', 'obtenerDocumentosCliente', cliente.idPortalCliente, cliente.token, renderDocumento);
  }

  function cargarBloqueCliente(targetId, fn, idPortalCliente, token, renderer) {
    const target = document.getElementById(targetId);
    target.textContent = 'Cargando...';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.textContent = res && res.mensaje ? res.mensaje : 'No disponible.';
          return;
        }
        const items = res.items || [];
        target.innerHTML = items.length ? items.map(renderer).join('') : '<p class="muted">Sin datos publicados.</p>';
      })
      .withFailureHandler(function(error) {
        target.textContent = error.message || String(error);
      })[fn](idPortalCliente, token);
  }

  function renderPublicacion(item) {
    return '<article class="item"><strong>' + esc(item.TITULO) + '</strong><small>' +
      esc(item.CATEGORIA || item.FECHA_PUBLICACION || '') + '</small><p>' + esc(item.CONTENIDO) + '</p></article>';
  }

  function renderMonitoreo(item) {
    return '<article class="item"><strong>' + esc(item.FECHA) + ' - ' + esc(item.SECTOR) +
      '</strong><small>' + esc(item.TIPO) + '</small><p>' + esc(item.RESULTADO) +
      '</p><small>' + esc(item.OBSERVACIONES) + '</small></article>';
  }

  function renderDocumento(item) {
    return '<article class="item"><strong>' + esc(item.TITULO) + '</strong><small>' +
      esc(item.TIPO) + '</small><p>' + esc(item.DESCRIPCION) +
      '</p><a href="' + esc(item.URL) + '" target="_blank">Abrir documento</a></article>';
  }

  function limpiarSesionCliente() {
    sessionStorage.removeItem('portalCliente');
    window.location.search = '';
  }

  function instalarPortal() {
    setMessage('adminMensaje', 'Verificando hojas PORTAL_...');
    google.script.run
      .withSuccessHandler(function(res) {
        setMessage('adminMensaje', res.mensaje || 'Listo.');
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })
      .instalarPortalClientesV1();
  }

  function crearPublicacionUi(event) {
    enviarAdminForm(event, 'crearPublicacionAdmin', 'Publicacion creada.');
  }

  function crearMonitoreoUi(event) {
    enviarAdminForm(event, 'crearMonitoreoAdmin', 'Monitoreo creado.');
  }

  function crearDocumentoUi(event) {
    enviarAdminForm(event, 'crearDocumentoAdmin', 'Documento creado.');
  }

  function enviarAdminForm(event, fn, okMessage) {
    event.preventDefault();
    const form = event.target;
    setMessage('adminMensaje', 'Guardando...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo guardar.', true);
          return;
        }
        form.reset();
        setMessage('adminMensaje', okMessage + ' ID: ' + res.id);
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](formToObject(form));
  }

  function esc(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
