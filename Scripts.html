<script>
  function formToObject(form) {
    const data = {};
    Array.prototype.forEach.call(form.elements, function(el) {
      if (!el.name) return;
      if (el.type === 'radio' && !el.checked) return;
      data[el.name] = el.type === 'checkbox' ? el.checked : el.value;
    });
    return data;
  }

  window.portalAdminClientes = window.portalAdminClientes || [];
  window.portalAdminPublicaciones = window.portalAdminPublicaciones || [];
  window.portalAdminEdicion = window.portalAdminEdicion || { publicaciones: [], documentos: [] };
  window.portalAdminOpciones = window.portalAdminOpciones || {};
  window.portalAdminPuntosCliente = window.portalAdminPuntosCliente || [];
  window.portalVisitaRapidaPuntos = window.portalVisitaRapidaPuntos || 0;
  window.portalVisitaTituloManual = window.portalVisitaTituloManual || false;
  window.portalUltimaVisitaRapida = window.portalUltimaVisitaRapida || null;
  const ADMIN_TABS_CONFIG = [
    { id: 'visitaRapida', label: 'Nuevo parte de servicio' },
    { id: 'clientes', label: 'Clientes' },
    { id: 'usuarios', label: 'Usuarios' },
    { id: 'publicaciones', label: 'Carga avanzada' },
    { id: 'plantillaPuntos', label: 'Plantilla de puntos' },
    { id: 'monitoreos', label: 'Monitoreos avanzado' },
    { id: 'documentos', label: 'Documentos' },
    { id: 'vistaCliente', label: 'Vista cliente' },
    { id: 'visibilidad', label: 'Gestionar visibilidad' },
    { id: 'editarRegistros', label: 'Editar registros' }
  ];
  const PORTAL_OPCIONES_FALLBACK = {
    SERVICIO: ['Fumigacion', 'Desratizacion', 'Desinsectacion', 'Desinfeccion', 'Monitoreo MIP', 'Inspeccion'],
    TIPO_INTERVENCION: ['Preventivo', 'Correctivo', 'Refuerzo', 'Seguimiento'],
    CARACTER_SERVICIO: ['Servicio usual / programado', 'Emergencia', 'Reclamo', 'Auditoria'],
    TIPO_PUNTO: ['Caja cebadera', 'Trampa mecanica', 'Placa adhesiva', 'Punto de inspeccion', 'Otro'],
    RESULTADO_MONITOREO: ['Sin actividad', 'Consumo bajo', 'Consumo medio', 'Consumo alto', 'Captura', 'Danada', 'Faltante', 'Reponer cebo', 'No inspeccionada'],
    ACCION_CORRECTIVA: ['No requiere', 'Se repuso cebo', 'Se reemplazo caja', 'Se limpio el punto', 'Se reforzo tratamiento', 'Informar al cliente'],
    NOVEDAD_SERVICIO: [
      'No se observaron indicios de actividad de plagas al momento de la visita.',
      'No se registraron novedades relevantes durante el servicio.',
      'Se detecto actividad compatible con presencia de plagas.',
      'Se observaron posibles puntos de ingreso a corregir.',
      'Se detecto consumo en cajas cebaderas.',
      'Se observaron sectores con necesidad de mejorar orden y limpieza.',
      'Se recomienda reforzar medidas preventivas en sectores criticos.'
    ],
    RECOMENDACION_SERVICIO: [
      'Mantener orden y limpieza en sectores criticos.',
      'Evitar acumulacion de mercaderia contra paredes.',
      'Mantener alimentos e insumos correctamente cerrados.',
      'Sellar aberturas, grietas o posibles puntos de ingreso.',
      'Retirar residuos con frecuencia y mantener contenedores cerrados.',
      'Evitar acumulacion de agua o humedad.',
      'Informar cualquier indicio de actividad entre servicios.',
      'Mantener despejado el acceso a cajas cebaderas y puntos de control.'
    ],
    RESUMEN_SERVICIO: [
      'Servicio realizado sin desvios relevantes.',
      'Servicio preventivo realizado correctamente.',
      'Servicio realizado con novedades informadas.',
      'Se realizo control preventivo y monitoreo de puntos.',
      'Se realizo intervencion correctiva segun novedades detectadas.',
      'Se recomienda mantener las medidas preventivas indicadas.'
    ],
    DETALLE_SERVICIO: [
      'Se realizo inspeccion general de los sectores indicados.',
      'Se efectuo control de puntos de monitoreo disponibles.',
      'Se verifico el estado general de cajas cebaderas y dispositivos.',
      'Se reforzo el tratamiento en sectores criticos.',
      'Se dejaron recomendaciones preventivas al responsable del establecimiento.',
      'No se observaron condiciones criticas al momento de la visita.'
    ]
  };

  function setMessage(id, text, isError) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || '';
    el.className = isError ? 'message error' : 'message';
  }

  function loginClienteUi() {
    console.log('login iniciado');
    setMessage('loginMensaje', 'Validando acceso...');
    google.script.run
      .withSuccessHandler(function(res) {
        console.log('respuesta loginCliente', res);
        if (!res || !res.ok) {
          setMessage('loginMensaje', res && res.mensaje ? res.mensaje : 'No se pudo ingresar.', true);
          return;
        }
        console.log('token portal cliente', res.cliente && res.cliente.token ? 'recibido' : 'sin token');
        window.portalSession = res.cliente;
        sessionStorage.setItem('portalCliente', JSON.stringify(res.cliente));
        mostrarPanelCliente();
        iniciarPortalCliente();
      })
      .withFailureHandler(function(error) {
        console.error('error loginCliente', error);
        setMessage('loginMensaje', error.message || String(error), true);
      })
      .loginCliente(
        document.getElementById('loginCuit').value,
        document.getElementById('loginEmail').value,
        document.getElementById('loginClave').value
      );
  }

  function inicializarPantallaCliente() {
    console.log('inicializarPantallaCliente');
    mostrarLoginCliente();

    try {
      const params = new URLSearchParams(window.location.search || '');
      if (params.get('logout') === '1' || params.get('forceLogin') === '1') {
        console.log('logout detectado');
        limpiarDatosSesionPortal();
        mostrarLoginCliente();
        setMessage('loginMensaje', 'Ingresa nuevamente para continuar.');
        return;
      }

      const raw = sessionStorage.getItem('portalCliente');
      if (!raw) return;

      const cliente = JSON.parse(raw);
      if (!cliente || !cliente.idPortalCliente || !cliente.token) return;

      window.portalSession = cliente;
      mostrarPanelCliente();
      iniciarPortalCliente();
    } catch (error) {
      console.error('error recuperando sesion portal', error);
      limpiarDatosSesionPortal();
      mostrarLoginCliente();
      setMessage('loginMensaje', 'No se pudo recuperar la sesion. Volve a ingresar.', true);
    }
  }

  function mostrarLoginCliente() {
    console.log('mostrando login');
    const login = document.getElementById('clienteLoginPanel');
    const panel = document.getElementById('clientePanel');
    if (login) login.classList.remove('hidden');
    if (panel) panel.classList.add('hidden');
  }

  function mostrarPanelCliente() {
    console.log('mostrando panel');
    const login = document.getElementById('clienteLoginPanel');
    const panel = document.getElementById('clientePanel');
    if (login) login.classList.add('hidden');
    if (panel) panel.classList.remove('hidden');
  }

  function limpiarDatosSesionPortal() {
    window.portalSession = null;
    sessionStorage.removeItem('portalCliente');
    sessionStorage.removeItem('portalToken');
    sessionStorage.removeItem('idPortalCliente');
    console.log('sesion limpiada');
  }

  function limpiarMensajesPanelCliente() {
    const detalle = document.getElementById('clienteDetalle');
    if (detalle) {
      detalle.textContent = '';
      detalle.className = 'muted';
    }
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (target) target.innerHTML = '<p class="muted">Sin datos publicados.</p>';
    });
  }

  function iniciarPortalClienteClasico_() {
    try {
      console.log('iniciarPortalCliente ejecutado');
      asegurarLayoutCliente();
      const cliente = window.portalSession || JSON.parse(sessionStorage.getItem('portalCliente') || 'null');
      console.log('sesion portal cliente', cliente);
      console.log('token portal cliente', cliente && cliente.token ? 'disponible' : 'faltante');

      if (!cliente || !cliente.idPortalCliente || !cliente.token) {
        mostrarErrorPortalCliente('La sesion esta incompleta. Volve a iniciar sesion.');
        return;
      }

      document.getElementById('clienteNombre').textContent = cliente.nombreFantasia || cliente.razonSocial || 'Cliente';
      document.getElementById('clienteDetalle').textContent = (cliente.cuit || '') + ' - ' + (cliente.email || '');
      cargarBloqueCliente('listaPublicaciones', 'obtenerPublicacionesCliente', cliente.idPortalCliente, cliente.token, renderPublicacion, 'publicaciones');
      cargarBloqueCliente('listaMonitoreos', 'obtenerMonitoreosCliente', cliente.idPortalCliente, cliente.token, renderMonitoreo, 'monitoreos');
      cargarBloqueCliente('listaDocumentos', 'obtenerDocumentosCliente', cliente.idPortalCliente, cliente.token, renderDocumento, 'documentos');
    } catch (error) {
      console.error('error iniciarPortalCliente', error);
      mostrarErrorPortalCliente(error.message || String(error));
    }
  }

  function asegurarLayoutCliente() {
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (!target) return;
      if (id === 'listaPublicaciones') target.innerHTML = '<p class="muted">Cargando publicaciones...</p>';
      if (id === 'listaMonitoreos') target.innerHTML = '<p class="muted">Cargando monitoreos...</p>';
      if (id === 'listaDocumentos') target.innerHTML = '<p class="muted">Cargando documentos...</p>';
    });
  }

  function mostrarErrorPortalCliente(mensaje) {
    const detalle = document.getElementById('clienteDetalle');
    if (detalle) {
      detalle.textContent = mensaje || 'No se pudo cargar el portal.';
      detalle.className = 'message error';
    }
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (target) target.innerHTML = '<p class="message error">' + esc(mensaje || 'No disponible.') + '</p>';
    });
  }

  function cargarBloqueCliente(targetId, fn, idPortalCliente, token, renderer, label) {
    const target = document.getElementById(targetId);
    if (!target) {
      console.error('No existe contenedor', targetId);
      return;
    }

    target.innerHTML = '<p class="muted">Cargando ' + esc(label || 'datos') + '...</p>';
    google.script.run
      .withSuccessHandler(function(res) {
        console.log(label || fn, res);
        if (!res || !res.ok) {
          target.innerHTML = '<p class="message error">' + esc(res && res.mensaje ? res.mensaje : 'No disponible.') + '</p>';
          return;
        }
        const items = res.items || [];
        target.innerHTML = items.length ? items.map(function(item) {
          try {
            return renderer(item);
          } catch (error) {
            console.error('error render ' + (label || fn), error, item);
            return '<article class="item"><strong>Error al mostrar registro</strong><small>' + esc(error.message || String(error)) + '</small></article>';
          }
        }).join('') : '<p class="muted">Sin datos publicados.</p>';
      })
      .withFailureHandler(function(error) {
        console.error('error ' + (label || fn), error);
        target.innerHTML = '<p class="message error">' + esc(error.message || String(error)) + '</p>';
      })[fn](idPortalCliente, token);
  }

  function renderPublicacion(item) {
    const subtitulo = [item.FECHA_VISITA, item.SUCURSAL, item.TIPO_SERVICIO].filter(Boolean).join(' - ');
    const resumen = item.RESUMEN_CLIENTE || item.CONTENIDO || '';
    return '<article class="item"><strong>' + esc(item.TITULO || 'Publicacion') + '</strong><small>' +
      esc(subtitulo || item.CATEGORIA || item.FECHA_PUBLICACION || '') + '</small><p>' + esc(resumen) + '</p></article>';
  }

  function renderMonitoreo(item) {
    return '<article class="item"><strong>' + esc(item.FECHA || '') + ' - ' + esc(item.SECTOR || '') +
      '</strong><small>' + esc(item.PUNTO_CONTROL || item.TIPO || '') + '</small><p>' + esc(item.RESULTADO || '') +
      '</p><small>' + esc(item.NOVEDAD || item.ACCION_CORRECTIVA || item.OBSERVACIONES || '') + '</small></article>';
  }

  function renderDocumento(item) {
    const url = item.URL || '';
    return '<article class="item"><strong>' + esc(item.TITULO || 'Documento') + '</strong><small>' +
      esc(item.TIPO || '') + '</small><p>' + esc(item.DESCRIPCION || '') +
      '</p>' + (url ? '<a href="' + esc(url) + '" target="_blank">Abrir / descargar PDF</a>' : '<small>Sin URL disponible</small>') + '</article>';
  }

  function limpiarSesionCliente() {
    cerrarSesionCliente();
  }

  function cerrarSesionCliente() {
    limpiarDatosSesionPortal();
    limpiarMensajesPanelCliente();
    mostrarLoginCliente();
    setMessage('loginMensaje', 'Sesion cerrada.');
  }

  function inicializarPantallaAdmin() {
    console.log('inicializarPantallaAdmin');
    asegurarPestanasAdminCompletas();
    const token = sessionStorage.getItem('portalAdminToken');
    if (token) {
      window.portalAdminToken = token;
      mostrarPanelAdmin();
      recargarAdminListas();
      return;
    }
    mostrarLoginAdmin();
  }

  function mostrarLoginAdmin() {
    const login = document.getElementById('adminLoginPanel');
    const panel = document.getElementById('adminAppPanel');
    if (login) login.classList.remove('hidden');
    if (panel) panel.classList.add('hidden');
  }

  function mostrarPanelAdmin() {
    const login = document.getElementById('adminLoginPanel');
    const panel = document.getElementById('adminAppPanel');
    if (login) login.classList.add('hidden');
    if (panel) panel.classList.remove('hidden');
    asegurarPestanasAdminCompletas();
  }

  function loginAdminUi(event) {
    event.preventDefault();
    setMessage('adminLoginMensaje', 'Validando PIN...');
    google.script.run
      .withSuccessHandler(function(res) {
        console.log('respuesta loginAdmin', res);
        if (!res || !res.ok) {
          setMessage('adminLoginMensaje', res && res.mensaje ? res.mensaje : 'No se pudo ingresar.', true);
          return;
        }

        window.portalAdminToken = res.token;
        sessionStorage.setItem('portalAdminToken', res.token);
        setMessage('adminLoginMensaje', '');
        mostrarPanelAdmin();
        mostrarAdminTab('visitaRapida');
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        console.error('error loginAdmin', error);
        setMessage('adminLoginMensaje', error.message || String(error), true);
      })
      .loginAdmin(document.getElementById('adminPin').value);
  }

  function cerrarSesionAdmin() {
    window.portalAdminToken = null;
    sessionStorage.removeItem('portalAdminToken');
    setMessage('adminMensaje', '');
    setMessage('adminLoginMensaje', 'Sesion admin cerrada.');
    mostrarLoginAdmin();
  }

  function obtenerAdminToken() {
    return window.portalAdminToken || sessionStorage.getItem('portalAdminToken') || '';
  }

  function asegurarPestanasAdminCompletas() {
    const panel = document.getElementById('adminAppPanel');
    if (!panel) return;

    let nav = panel.querySelector('.admin-tabs');
    if (!nav) {
      nav = document.createElement('nav');
      nav.className = 'admin-tabs';
      nav.setAttribute('aria-label', 'Secciones admin');
      const mensaje = document.getElementById('adminMensaje');
      panel.insertBefore(nav, mensaje || panel.firstChild);
    }

    ADMIN_TABS_CONFIG.forEach(function(tab) {
      let button = nav.querySelector('[data-admin-tab="' + tab.id + '"]');
      if (!button) {
        button = document.createElement('button');
        button.type = 'button';
        button.className = 'admin-tab';
        button.dataset.adminTab = tab.id;
        button.textContent = tab.label;
        button.addEventListener('click', function() {
          mostrarAdminTab(tab.id);
        });
        nav.appendChild(button);
      } else {
        button.classList.add('admin-tab');
        button.type = 'button';
        if (!button.getAttribute('onclick')) {
          button.addEventListener('click', function() {
            mostrarAdminTab(tab.id);
          });
        }
      }
    });
  }

  function ejecutarSeguroAdmin_(fn, nombre) {
    try {
      if (typeof fn === 'function') fn();
    } catch (error) {
      console.error('Error cargando ' + nombre + ' admin', error);
      setMessage('adminMensaje', 'No se pudo cargar ' + nombre + '. Las pestanas siguen disponibles.', true);
    }
  }

  function mostrarAdminTab(tab) {
    asegurarPestanasAdminCompletas();
    Array.prototype.forEach.call(document.querySelectorAll('.admin-tab-panel'), function(panel) {
      panel.classList.add('hidden');
    });
    Array.prototype.forEach.call(document.querySelectorAll('.admin-tab'), function(button) {
      button.classList.toggle('active', button.dataset.adminTab === tab);
    });

    const target = document.getElementById('adminTab-' + tab);
    setMessage('adminMensaje', '');
    if (target) target.classList.remove('hidden');
    try {
      if (tab === 'visitaRapida' && !Object.keys(window.portalAdminOpciones || {}).length) {
        cargarOpcionesCargaRapidaAdmin();
      }
      if (tab === 'visitaRapida' && !document.querySelector('#visitaRapidaPuntos .visita-punto')) {
        agregarPuntoVisitaRapida();
      }
      if (tab === 'visitaRapida') {
        actualizarModoPuntosVisitaRapida();
        actualizarPreviewVisitaRapida();
      }
      if (tab === 'plantillaPuntos') {
        llenarOpcionesPlantillaPuntos();
      }
    } catch (error) {
      console.error('Error preparando pestana admin', tab, error);
      setMessage('adminMensaje', 'La pestana se abrio, pero hubo un problema preparando algunos datos. Revisa la consola o actualiza listas.', true);
    }
  }

  function recargarAdminListas() {
    ejecutarSeguroAdmin_(cargarClientesAdmin, 'clientes');
    ejecutarSeguroAdmin_(cargarPublicacionesAdmin, 'publicaciones');
    ejecutarSeguroAdmin_(cargarOpcionesPortalAdmin, 'opciones');
  }

  function cargarOpcionesPortalAdmin() {
    const token = obtenerAdminToken();
    if (!token) return;

    google.script.run
      .withSuccessHandler(function(res) {
        console.log('opciones portal admin', res);
        window.portalAdminOpciones = normalizarOpcionesPortalAdmin(res && res.ok ? res.opciones : {});
        llenarOpcionesVisitaRapida();
        if (res && res.mensaje) setMessage('adminMensaje', res.mensaje);
      })
      .withFailureHandler(function(error) {
        console.error('error opciones portal admin', error);
        window.portalAdminOpciones = normalizarOpcionesPortalAdmin({});
        llenarOpcionesVisitaRapida();
        setMessage('adminMensaje', 'No se pudieron cargar las opciones. Usa Inicializar opciones o revisa PORTAL_OPCIONES.', true);
      })
      .obtenerOpcionesPortalAdmin(token);
  }

  function cargarOpcionesCargaRapidaAdmin() {
    cargarOpcionesPortalAdmin();
  }

  function inicializarOpcionesPortalUi() {
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    if (!confirm('Esto creara PORTAL_OPCIONES si no existe y cargara opciones iniciales si esta vacia. Continuar?')) return;

    setMessage('adminMensaje', 'Inicializando opciones...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudieron inicializar opciones.', true);
          return;
        }
        setMessage('adminMensaje', res.mensaje || 'Opciones inicializadas.');
        cargarOpcionesPortalAdmin();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })
      .inicializarOpcionesPortalAdmin(token);
  }

  function llenarOpcionesVisitaRapida() {
    llenarSelectOpcionesPortal('selectVisitaServicio', 'SERVICIO', 'Selecciona servicio');
    llenarSelectOpcionesPortal('selectVisitaTipoIntervencion', 'TIPO_INTERVENCION', 'Selecciona tipo');
    llenarSelectOpcionesPortal('selectVisitaCaracterServicio', 'CARACTER_SERVICIO', 'Selecciona caracter');
    llenarOpcionesTextoServicio();
    document.querySelectorAll('[data-opciones-grupo]').forEach(function(select) {
      llenarSelectOpcionesPortal(select.id, select.dataset.opcionesGrupo, select.dataset.placeholder || 'Selecciona opcion');
    });
  }


  function llenarOpcionesTextoServicio() {
    document.querySelectorAll('[data-combo-field][data-opciones-grupo]').forEach(function(block) {
      const campo = block.dataset.comboField;
      const grupo = block.dataset.opcionesGrupo;
      const target = block.querySelector('[data-combo-options]');
      if (!campo || !grupo || !target) return;
      const opciones = obtenerOpcionesPortalGrupo(grupo);
      target.innerHTML = opciones.map(function(opcion, index) {
        const id = 'combo-' + campo + '-' + index;
        const valor = opcion.valor || opcion.etiqueta || '';
        const etiqueta = opcion.etiqueta || opcion.valor || '';
        return '<label class="multi-option-chip" for="' + esc(id) + '">' +
          '<input id="' + esc(id) + '" type="checkbox" data-combo-check="' + esc(campo) + '" value="' + esc(valor) + '">' +
          '<span>' + esc(etiqueta) + '</span>' +
        '</label>';
      }).join('');
    });
  }

  function combinarOpcionesTextoServicio(campo) {
    const valores = [];
    const vistos = {};
    document.querySelectorAll('[data-combo-check="' + campo + '"]:checked').forEach(function(input) {
      agregarLineaTextoServicio_(valores, vistos, input.value);
    });
    const libre = document.querySelector('[data-combo-free="' + campo + '"]');
    if (libre) agregarLineasTextoServicio_(valores, vistos, libre.value);
    return valores.join('\n');
  }

  function prepararTextoInformeVisitaRapida(data) {
    ['novedades', 'consejos', 'resumenCliente', 'contenido'].forEach(function(campo) {
      const combinado = combinarOpcionesTextoServicio(campo);
      if (combinado || !data[campo]) data[campo] = combinado;
    });
  }

  function limpiarOpcionesTextoServicio() {
    document.querySelectorAll('[data-combo-check]').forEach(function(input) {
      input.checked = false;
    });
    document.querySelectorAll('[data-combo-free]').forEach(function(textarea) {
      textarea.value = '';
    });
  }

  function agregarLineasTextoServicio_(valores, vistos, texto) {
    String(texto || '').split(/\r?\n/).forEach(function(linea) {
      agregarLineaTextoServicio_(valores, vistos, linea);
    });
  }

  function agregarLineaTextoServicio_(valores, vistos, texto) {
    const limpio = String(texto || '').trim();
    if (!limpio) return;
    const key = limpio.toLowerCase();
    if (vistos[key]) return;
    vistos[key] = true;
    valores.push(limpio);
  }

  function llenarSelectOpcionesPortal(selectId, grupo, placeholder) {
    const select = document.getElementById(selectId);
    if (!select) return;
    const actual = select.value;
    const opciones = obtenerOpcionesPortalGrupo(grupo);
    select.innerHTML = '';
    select.appendChild(crearOption('', placeholder || 'Selecciona opcion'));
    opciones.forEach(function(opcion) {
      select.appendChild(crearOption(opcion.valor, opcion.etiqueta || opcion.valor));
    });
    if (actual && opciones.some(function(opcion) { return opcion.valor === actual; })) select.value = actual;
    actualizarPreviewVisitaRapida();
  }

  function normalizarOpcionesPortalAdmin(opciones) {
    const out = {};
    const fuente = opciones || {};
    Object.keys(PORTAL_OPCIONES_FALLBACK).forEach(function(grupo) {
      const lista = Array.isArray(fuente[grupo]) && fuente[grupo].length
        ? fuente[grupo]
        : PORTAL_OPCIONES_FALLBACK[grupo];
      out[grupo] = lista.map(function(opcion) {
        if (typeof opcion === 'string') {
          return { valor: opcion, etiqueta: opcion };
        }
        const valor = opcion && (opcion.valor || opcion.VALOR || opcion.etiqueta || opcion.ETIQUETA) || '';
        const etiqueta = opcion && (opcion.etiqueta || opcion.ETIQUETA || opcion.valor || opcion.VALOR) || valor;
        return {
          valor: String(valor || '').trim(),
          etiqueta: String(etiqueta || '').trim()
        };
      }).filter(function(opcion) {
        return opcion.valor || opcion.etiqueta;
      });
    });
    return out;
  }

  function guardarEdicionRegistroAdmin(fn, id, editor, okMessage) {
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    const data = {};
    Array.prototype.forEach.call(editor.querySelectorAll('input, textarea, select'), function(el) {
      if (!el.name) return;
      data[el.name] = el.value;
    });

    setMessage('adminMensaje', 'Guardando cambios...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo actualizar.', true);
          return;
        }
        setMessage('adminMensaje', okMessage);
        cargarEdicionRegistrosAdmin();
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](id, data, token);
  }

  function cerrarEditorAdmin(id) {
    const target = document.getElementById(id);
    if (!target) return;
    target.innerHTML = '';
    target.classList.add('hidden');
  }

  function selectedIf(actual, esperado) {
    return String(actual || '').toUpperCase() === esperado ? ' selected' : '';
  }

  function actualizarSelectsPublicacionesDependientes() {
    actualizarSelectPublicacionesPorCliente('selectClienteMonitoreo', 'selectPublicacionMonitoreo', false);
    actualizarSelectPublicacionesPorCliente('selectClienteDocumento', 'selectPublicacionDocumento', true);
  }

  function actualizarSelectPublicacionesPorCliente(clienteSelectId, publicacionSelectId, permiteVacio) {
    const clienteSelect = document.getElementById(clienteSelectId);
    const publicacionSelect = document.getElementById(publicacionSelectId);
    if (!clienteSelect || !publicacionSelect) return;

    const idCliente = clienteSelect.value;
    const publicaciones = (window.portalAdminPublicaciones || []).filter(function(publicacion) {
      return publicacion.idPortalCliente === idCliente;
    });
    const valorActual = publicacionSelect.value;
    publicacionSelect.innerHTML = '';

    if (permiteVacio) {
      publicacionSelect.appendChild(crearOption('', 'Documento general del cliente'));
    } else {
      publicacionSelect.appendChild(crearOption('', idCliente ? 'Selecciona una publicacion' : 'Selecciona un cliente primero'));
    }

    if (!idCliente) {
      publicacionSelect.disabled = !permiteVacio;
      return;
    }

    if (!publicaciones.length) {
      publicacionSelect.appendChild(crearOption('', 'Sin publicaciones para este cliente'));
      publicacionSelect.disabled = !permiteVacio;
      return;
    }

    publicacionSelect.disabled = false;
    publicaciones.forEach(function(publicacion) {
      publicacionSelect.appendChild(crearOption(publicacion.idPublicacion, textoPublicacionAdmin(publicacion)));
    });

    if (valorActual && publicaciones.some(function(publicacion) { return publicacion.idPublicacion === valorActual; })) {
      publicacionSelect.value = valorActual;
    }
  }

  function completarCuitUsuarioDesdeCliente() {
    const select = document.getElementById('selectClienteUsuario');
    if (!select) return;
    const form = select.form;
    if (!form || !form.elements.cuit) return;
    const cliente = obtenerClienteAdminPorId(select.value);
    if (cliente && cliente.cuit) {
      form.elements.cuit.value = cliente.cuit;
    }
  }

  function obtenerClienteAdminPorId(idPortalCliente) {
    return (window.portalAdminClientes || []).find(function(cliente) {
      return cliente.idPortalCliente === idPortalCliente;
    }) || null;
  }

  function textoClienteAdmin(cliente) {
    const nombre = cliente.razonSocial || cliente.nombreFantasia || 'Cliente sin nombre';
    return nombre + ' - CUIT ' + (cliente.cuit || 'sin CUIT') + ' - ' + cliente.idPortalCliente;
  }

  function textoPublicacionAdmin(publicacion) {
    return [
      publicacion.fechaVisita || publicacion.fechaCarga || 'Sin fecha',
      publicacion.tipoServicio || publicacion.titulo || 'Sin tipo',
      publicacion.sucursal || 'Sin sucursal',
      publicacion.idPublicacion
    ].join(' - ');
  }

  function crearOption(value, text) {
    const option = document.createElement('option');
    option.value = value || '';
    option.textContent = text || '';
    return option;
  }

  function crearClientePortalUi(event) {
    enviarAdminForm(event, 'crearClientePortalAdmin', 'Cliente creado.');
  }

  function crearUsuarioPortalUi(event) {
    enviarAdminForm(event, 'crearUsuarioPortalAdmin', 'Usuario creado.');
  }

  function crearPublicacionUi(event) {
    enviarAdminForm(event, 'crearPublicacionAdmin', 'Publicacion creada.');
  }

  function crearMonitoreoUi(event) {
    enviarAdminForm(event, 'crearMonitoreoAdmin', 'Monitoreo creado.');
  }

  function crearDocumentoUi(event) {
    enviarAdminForm(event, 'crearDocumentoAdmin', 'Documento creado.');
  }

  function enviarAdminForm(event, fn, okMessage) {
    event.preventDefault();
    const form = event.target;
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    setMessage('adminMensaje', 'Guardando...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo guardar.', true);
          return;
        }
        form.reset();
        setMessage('adminMensaje', okMessage + ' ID: ' + res.id);
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](formToObject(form), token);
  }

  function esc(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

function iniciarPortalCliente() {
  var sesion = obtenerSesionClienteActualUi_();

  if (!sesion) {
    mostrarLoginCliente();
    return;
  }

  var nombreCliente = obtenerValorFlexibleUi_(sesion, [
    'nombreFantasia',
    'NOMBRE_FANTASIA',
    'razonSocial',
    'RAZON_SOCIAL',
    'cliente',
    'nombre'
  ]);

  var cuitCliente = obtenerValorFlexibleUi_(sesion, [
    'cuit',
    'CUIT'
  ]);

  var emailCliente = obtenerValorFlexibleUi_(sesion, [
    'email',
    'EMAIL'
  ]);

  var clienteNombre = document.getElementById('clienteNombre');
  if (clienteNombre) {
    clienteNombre.textContent = nombreCliente || 'Portal Cliente';
  }

  var clienteDetalle = document.getElementById('clienteDetalle');
  if (clienteDetalle) {
    var detalle = [];
    if (cuitCliente) detalle.push('CUIT: ' + cuitCliente);
    if (emailCliente) detalle.push(emailCliente);
    clienteDetalle.textContent = detalle.join('  -  ');
  }

  cargarPanelClienteAgrupadoUi();
}

function cargarPanelClienteAgrupadoUi() {
  var sesion = obtenerSesionClienteActualUi_();
  var contenedor = document.getElementById('listaPublicaciones');

  limpiarBloquesClasicosClienteUi_();

  if (!contenedor) {
    mostrarMensajeClientePanelUi_('No se encontro el contenedor principal del panel.', true);
    return;
  }

  if (!sesion) {
    mostrarLoginCliente();
    return;
  }

  var idPortalCliente = obtenerValorFlexibleUi_(sesion, [
    'idPortalCliente',
    'ID_PORTAL_CLIENTE',
    'idCliente',
    'clienteId'
  ]);

  var token = obtenerValorFlexibleUi_(sesion, [
    'token',
    'TOKEN',
    'sessionToken'
  ]);

  if (!idPortalCliente || !token) {
    contenedor.innerHTML = '<div class="empty-state">La sesion del cliente no es valida. Cerra sesion e ingresa nuevamente.</div>';
    return;
  }

  contenedor.innerHTML = '<div class="loading-card">Cargando panel de servicios...</div>';

  google.script.run
    .withSuccessHandler(function (data) {
      renderPanelClienteAgrupadoUi(data);
    })
    .withFailureHandler(function (err) {
      var mensaje = err && err.message ? err.message : String(err || 'Error desconocido');
      contenedor.innerHTML = '<div class="error-card">No se pudo cargar el panel del cliente: ' + escaparHtmlClienteUi_(mensaje) + '</div>';
    })
    .obtenerPanelClienteAgrupado(idPortalCliente, token);
}

function obtenerValorFlexibleUi_(obj, claves) {
  if (!obj || !claves) return '';

  for (var i = 0; i < claves.length; i++) {
    var clave = claves[i];

    if (Object.prototype.hasOwnProperty.call(obj, clave)) {
      return obj[clave];
    }

    var reales = Object.keys(obj);
    for (var j = 0; j < reales.length; j++) {
      if (String(reales[j]).toUpperCase() === String(clave).toUpperCase()) {
        return obj[reales[j]];
      }
    }
  }

  return '';
}

function obtenerClaseEstadoVisitaClienteUi_(estado) {
  var normalizado = normalizarTextoClienteUi_(estado);

  if (normalizado === 'sin desvios') return 'estado-ok';
  if (normalizado === 'con novedades') return 'estado-alerta';

  return 'estado-neutral';
}

function obtenerClaseResultadoPuntoClienteUi_(resultado) {
  var normalizado = normalizarTextoClienteUi_(resultado);

  if (normalizado === 'sin actividad') return 'resultado-ok';
  if (!normalizado || normalizado === 'no inspeccionada') return 'resultado-neutral';

  return 'resultado-alerta';
}

function normalizarTextoClienteUi_(texto) {
  return String(texto || '')
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function formatearFechaClienteUi_(fecha) {
  if (!fecha) return '';

  if (Object.prototype.toString.call(fecha) === '[object Date]') {
    return fecha.toLocaleDateString('es-AR');
  }

  var texto = String(fecha).trim();

  if (/^\d{4}-\d{2}-\d{2}/.test(texto)) {
    var partesIso = texto.substring(0, 10).split('-');
    return partesIso[2] + '/' + partesIso[1] + '/' + partesIso[0];
  }

  return texto;
}

function textoMultilineaClienteUi_(texto) {
  return escaparHtmlClienteUi_(texto).replace(/\n/g, '<br>');
}

function escaparHtmlClienteUi_(valor) {
  return String(valor === null || valor === undefined ? '' : valor)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escaparAtributoClienteUi_(valor) {
  return escaparHtmlClienteUi_(valor).replace(/`/g, '&#096;');
}

function renderVistaClienteAdminAgrupadaUi_(data) {
  var cliente = data && data.cliente ? data.cliente : {};
  var panelData = construirPanelAgrupadoDesdeVistaAdminUi_(data || {});
  return renderVistaClienteDatosLimpioUi_(cliente) + '<article class="panel cliente-panel-servicios"><h3>Vista del cliente</h3>' + renderPanelAgrupadoHtmlLimpioUi_(panelData, 'admin') + '</article>';

function construirPanelAgrupadoDesdeVistaAdminUi_(data) {
  var publicaciones = data.publicaciones || [];
  var monitoreos = data.monitoreos || [];
  var documentos = data.documentos || [];
  var monitoreosPorPublicacion = agruparItemsClienteUi_(monitoreos, 'idPublicacion');
  var documentosPorPublicacion = agruparItemsClienteUi_(documentos, 'idPublicacion');
  var documentosGenerales = documentos.filter(function(doc) { return !doc.idPublicacion; });

  var visitas = publicaciones.map(function(pub) {
    var idPublicacion = pub.idPublicacion || '';
    var puntos = (monitoreosPorPublicacion[idPublicacion] || []).map(function(mon) {
      return {
        fecha: mon.fecha,
        sector: mon.sector,
        puntoControl: mon.puntoControl,
        tipo: mon.tipo,
        resultado: mon.resultado,
        novedad: mon.novedad,
        accionCorrectiva: mon.accionCorrectiva,
        observaciones: mon.observaciones
      };
    });

    return {
      idPublicacion: idPublicacion,
      fechaVisita: pub.fechaVisita,
      sucursal: pub.sucursal,
      tipoServicio: pub.tipoServicio,
      titulo: pub.titulo,
      categoria: pub.categoria,
      resumenCliente: pub.resumenCliente,
      contenido: pub.contenido,
      indicadores: calcularIndicadoresClienteUi_(puntos),
      monitoreos: puntos,
      documentos: (documentosPorPublicacion[idPublicacion] || []).map(normalizarDocumentoClienteUi_)
    };
  });

  visitas.sort(function(a, b) {
    return obtenerFechaOrdenClienteUi_(b.fechaVisita) - obtenerFechaOrdenClienteUi_(a.fechaVisita);
  });

  return {
    ok: true,
    resumen: calcularResumenClienteUi_(visitas, documentos),
    visitas: visitas,
    documentosGenerales: documentosGenerales.map(normalizarDocumentoClienteUi_)
  };
}

function renderPanelAgrupadoHtmlLimpioUi_(data, contexto) {
  var resumen = data.resumen || {};
  var visitas = Array.isArray(data.visitas) ? data.visitas : [];
  var documentosGenerales = Array.isArray(data.documentosGenerales) ? data.documentosGenerales : [];
  var html = renderResumenClienteVisualLimpioUi_(resumen);

  if (!visitas.length) {
    html += '<div class="empty-state">Todavia no hay visitas publicadas para este cliente.</div>';
  } else {
    html += '<div class="visitas-cliente-lista">';
    visitas.forEach(function(visita, index) {
      html += renderTarjetaVisitaClienteLimpiaUi_(visita, index, contexto || 'admin');
    });
    html += '</div>';
  }

  if (documentosGenerales.length) {
    html += renderDocumentosGeneralesClienteLimpiosUi_(documentosGenerales);
  }

  return html;
}

function renderVistaClienteDatosLimpioUi_(cliente) {
  var nombre = cliente.razonSocial || cliente.nombreFantasia || 'Cliente';
  return '<article class="panel"><span class="eyebrow">Cliente</span><h3>' + esc(nombre) +
    '</h3><p><strong>CUIT:</strong> ' + esc(cliente.cuit || '') + '</p><p><strong>Email:</strong> ' +
    esc(cliente.emailPrincipal || '') + '</p><p><strong>Telefono:</strong> ' + esc(cliente.telefono || '') +
    '</p><p><strong>Direccion:</strong> ' + esc(cliente.direccion || '') + '</p></article>';
}

function renderResumenClienteVisualLimpioUi_(resumen) {
  var porcentaje = resumen.porcentajeGeneralSinActividad;
  return '<section class="cliente-dashboard-resumen">' +
    '<div class="cliente-resumen-card"><span class="cliente-resumen-label">Visitas publicadas</span><strong>' + escaparHtmlClienteUi_(resumen.totalVisitas || 0) + '</strong></div>' +
    '<div class="cliente-resumen-card"><span class="cliente-resumen-label">Ultima visita</span><strong>' + escaparHtmlClienteUi_(formatearFechaClienteUi_(resumen.ultimaVisita) || '-') + '</strong></div>' +
    '<div class="cliente-resumen-card"><span class="cliente-resumen-label">Puntos controlados</span><strong>' + escaparHtmlClienteUi_(resumen.totalPuntos || 0) + '</strong></div>' +
    '<div class="cliente-resumen-card"><span class="cliente-resumen-label">Puntos sin actividad</span><strong>' + (porcentaje === null || porcentaje === undefined ? '-' : escaparHtmlClienteUi_(porcentaje + '%')) + '</strong></div>' +
    '<div class="cliente-resumen-card"><span class="cliente-resumen-label">Con novedades</span><strong>' + escaparHtmlClienteUi_(resumen.totalPuntosConNovedad || 0) + '</strong></div>' +
    '</section>';
}

function renderTarjetaVisitaClienteLimpiaUi_(visita, index, contexto) {
  var indicadores = visita.indicadores || {};
  var estado = indicadores.estadoVisual || 'Servicio registrado';
  var detalleId = 'detalle-visita-' + (contexto || 'cliente') + '-' + index;
  var puntosTexto = (indicadores.totalPuntos || 0) > 0
    ? escaparHtmlClienteUi_(indicadores.puntosControlados || 0) + '/' + escaparHtmlClienteUi_(indicadores.totalPuntos || 0) + ' puntos controlados'
    : 'Sin puntos de control';
  var idPublicacion = visita.idPublicacion || '';
  var accionesAdmin = contexto === 'admin' && idPublicacion
    ? '<div class="visita-admin-actions"><button class="secondary-button" type="button" onclick="generarPdfParteServicioAdminUi(\'' + escaparAtributoClienteUi_(idPublicacion) + '\')">Generar PDF</button></div>'
    : '';

  return '<article class="visita-cliente-card">' +
    '<button type="button" class="visita-cliente-header" onclick="toggleDetalleVisitaClienteUi(\'' + detalleId + '\')">' +
      '<div class="visita-cliente-main">' +
        '<span class="visita-cliente-fecha">' + escaparHtmlClienteUi_(formatearFechaClienteUi_(visita.fechaVisita) || '-') + '</span>' +
        '<strong class="visita-cliente-titulo">' + escaparHtmlClienteUi_(visita.titulo || visita.tipoServicio || 'Servicio realizado') + '</strong>' +
        '<span class="visita-cliente-subtitulo">' + escaparHtmlClienteUi_([visita.tipoServicio || 'Servicio', visita.sucursal || ''].filter(Boolean).join(' - ')) + '</span>' +
      '</div>' +
      '<div class="visita-cliente-metricas">' +
        '<span class="estado-visita-badge ' + obtenerClaseEstadoVisitaClienteUi_(estado) + '">' + escaparHtmlClienteUi_(estado) + '</span>' +
        renderMiniProgresoClienteUi_(indicadores.porcentajeControl) +
        '<span class="visita-cliente-puntos">' + puntosTexto + '</span>' +
        '<span class="visita-cliente-toggle">Ver detalle</span>' +
      '</div>' +
    '</button>' +
    accionesAdmin +
    '<div id="' + detalleId + '" class="visita-cliente-detalle" style="display:none;">' +
      renderDetalleServicioClienteLimpioUi_(visita) +
      renderMonitoreosVisitaClienteLimpiosUi_(visita.monitoreos || []) +
      renderDocumentosVisitaClienteLimpiosUi_(visita.documentos || []) +
    '</div>' +
  '</article>';
}

function renderDetalleServicioClienteLimpioUi_(visita) {
  return '<div class="detalle-grid-cliente">' +
    '<section class="detalle-bloque-cliente"><h4>Servicio realizado</h4>' +
      '<p><strong>Fecha:</strong> ' + escaparHtmlClienteUi_(formatearFechaClienteUi_(visita.fechaVisita) || '-') + '</p>' +
      '<p><strong>Servicio:</strong> ' + escaparHtmlClienteUi_(visita.tipoServicio || '-') + '</p>' +
      '<p><strong>Categoria:</strong> ' + escaparHtmlClienteUi_(visita.categoria || '-') + '</p>' +
      '<p><strong>Sucursal/Sector:</strong> ' + escaparHtmlClienteUi_(visita.sucursal || '-') + '</p>' +
    '</section>' +
    '<section class="detalle-bloque-cliente"><h4>Informe para el cliente</h4>' +
      '<p><strong>Resumen:</strong> ' + escaparHtmlClienteUi_(visita.resumenCliente || 'Sin resumen informado.') + '</p>' +
      '<p>' + textoMultilineaClienteUi_(visita.contenido || 'Sin detalle adicional informado.') + '</p>' +
    '</section>' +
  '</div>';
}

function renderMonitoreosVisitaClienteLimpiosUi_(monitoreos) {
  if (!monitoreos.length) {
    return '<section class="detalle-bloque-cliente"><h4>Puntos controlados</h4><div class="empty-state small">Esta visita no tiene puntos de monitoreo asociados.</div></section>';
  }
  var html = '<section class="detalle-bloque-cliente"><h4>Puntos controlados</h4><div class="puntos-cliente-grid">';
  monitoreos.forEach(function(mon) {
    html += '<div class="punto-cliente-card"><div class="punto-cliente-head"><strong>' + escaparHtmlClienteUi_(mon.puntoControl || 'Punto') + '</strong>' +
      '<span class="resultado-punto-badge ' + obtenerClaseResultadoPuntoClienteUi_(mon.resultado) + '">' + escaparHtmlClienteUi_(mon.resultado || '-') + '</span></div>' +
      '<p><strong>Sector:</strong> ' + escaparHtmlClienteUi_(mon.sector || '-') + '</p>' +
      '<p><strong>Tipo:</strong> ' + escaparHtmlClienteUi_(mon.tipo || '-') + '</p>' +
      '<p><strong>Novedad:</strong> ' + escaparHtmlClienteUi_(mon.novedad || 'Sin novedades') + '</p>' +
      '<p><strong>Accion correctiva:</strong> ' + escaparHtmlClienteUi_(mon.accionCorrectiva || 'No requiere') + '</p>' +
      (mon.observaciones ? '<p><strong>Observaciones:</strong> ' + escaparHtmlClienteUi_(mon.observaciones) + '</p>' : '') +
      '</div>';
  });
  return html + '</div></section>';
}

function renderDocumentosVisitaClienteLimpiosUi_(documentos) {
  if (!documentos.length) {
    return '<section class="detalle-bloque-cliente"><h4>Documentos</h4><div class="empty-state small">Sin documentos asociados a esta visita.</div></section>';
  }
  var html = '<section class="detalle-bloque-cliente"><h4>Documentos</h4><div class="documentos-cliente-lista">';
  documentos.forEach(function(doc) {
    html += renderDocumentoClienteItemLimpioUi_(doc);
  });
  return html + '</div></section>';
}

function renderDocumentosGeneralesClienteLimpiosUi_(documentos) {
  var html = '<section class="documentos-generales-cliente"><h3>Documentos generales</h3>';
  documentos.forEach(function(doc) {
    html += renderDocumentoClienteItemLimpioUi_(doc);
  });
  return html + '</section>';
}

function renderDocumentoClienteItemLimpioUi_(doc) {
  return '<div class="documento-cliente-item"><div><strong>' + escaparHtmlClienteUi_(doc.titulo || 'Documento') + '</strong>' +
    '<span>' + escaparHtmlClienteUi_(doc.tipo || '') + '</span>' +
    (doc.descripcion ? '<p>' + escaparHtmlClienteUi_(doc.descripcion) + '</p>' : '') +
    (doc.fechaCarga ? '<p><small>Generado: ' + escaparHtmlClienteUi_(doc.fechaCarga) + '</small></p>' : '') +
    '</div>' +
    (doc.url ? '<a class="btn-documento-cliente" href="' + escaparAtributoClienteUi_(doc.url) + '" target="_blank" rel="noopener">Abrir / descargar PDF</a>' : '') +
    '</div>';
}

function agruparItemsClienteUi_(items, campo) {
  var out = {};
  (items || []).forEach(function(item) {
    var clave = item && item[campo] ? String(item[campo]) : '';
    if (!clave) return;
    if (!out[clave]) out[clave] = [];
    out[clave].push(item);
  });
  return out;
}

function normalizarDocumentoClienteUi_(doc) {
  return {
    titulo: doc.titulo || doc.TITULO || '',
    tipo: doc.tipo || doc.TIPO || '',
    url: doc.url || doc.URL || '',
    descripcion: doc.descripcion || doc.DESCRIPCION || ''
  };
}

function calcularIndicadoresClienteUi_(monitoreos) {
  var totalPuntos = monitoreos.length;
  var puntosControlados = 0;
  var puntosSinActividad = 0;
  var puntosConNovedad = 0;
  monitoreos.forEach(function(mon) {
    var resultadoNorm = normalizarTextoClienteUi_(mon.resultado);
    var novedadNorm = normalizarTextoClienteUi_(mon.novedad);
    var controlado = resultadoNorm && resultadoNorm !== 'no inspeccionada';
    var sinActividad = resultadoNorm === 'sin actividad';
    var conNovedad = resultadoNorm && resultadoNorm !== 'sin actividad' && resultadoNorm !== 'no inspeccionada';
    if (novedadNorm && novedadNorm !== 'sin novedades' && novedadNorm !== 'sin novedad' && novedadNorm !== 'no aplica') conNovedad = true;
    if (controlado) puntosControlados++;
    if (sinActividad) puntosSinActividad++;
    if (conNovedad) puntosConNovedad++;
  });
  return {
    totalPuntos: totalPuntos,
    puntosControlados: puntosControlados,
    puntosSinActividad: puntosSinActividad,
    puntosConNovedad: puntosConNovedad,
    porcentajeControl: totalPuntos ? Math.round((puntosControlados / totalPuntos) * 100) : null,
    porcentajeSinActividad: totalPuntos ? Math.round((puntosSinActividad / totalPuntos) * 100) : null,
    estadoVisual: totalPuntos ? (puntosConNovedad ? 'Con novedades' : 'Sin desvios') : 'Servicio registrado'
  };
}

function calcularResumenClienteUi_(visitas, documentos) {
  var totalPuntos = 0;
  var totalPuntosSinActividad = 0;
  var totalPuntosConNovedad = 0;
  visitas.forEach(function(visita) {
    totalPuntos += visita.indicadores.totalPuntos || 0;
    totalPuntosSinActividad += visita.indicadores.puntosSinActividad || 0;
    totalPuntosConNovedad += visita.indicadores.puntosConNovedad || 0;
  });
  return {
    totalVisitas: visitas.length,
    ultimaVisita: visitas.length ? visitas[0].fechaVisita : '',
    totalPuntos: totalPuntos,
    totalPuntosConNovedad: totalPuntosConNovedad,
    porcentajeGeneralSinActividad: totalPuntos ? Math.round((totalPuntosSinActividad / totalPuntos) * 100) : null,
    documentosDisponibles: (documentos || []).length
  };
}

function obtenerFechaOrdenClienteUi_(fecha) {
  if (!fecha) return 0;
  var texto = String(fecha).trim();
  var iso = new Date(texto);
  if (!isNaN(iso.getTime())) return iso.getTime();
  var partes = texto.split(/[\/\-]/);
  if (partes.length === 3) {
    var dia = Number(partes[0]);
    var mes = Number(partes[1]) - 1;
    var anio = Number(partes[2]);
    if (anio < 100) anio += 2000;
    var manual = new Date(anio, mes, dia);
    if (!isNaN(manual.getTime())) return manual.getTime();
  }
  return 0;
}

function ocultarBloqueClienteClasicoUi_(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  var article = el.closest ? el.closest('article') : null;
  if (article) article.classList.add('hidden');
}
</script>
