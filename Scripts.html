<script>
  function formToObject(form) {
    const data = {};
    Array.prototype.forEach.call(form.elements, function(el) {
      if (!el.name) return;
      data[el.name] = el.type === 'checkbox' ? el.checked : el.value;
    });
    return data;
  }

  window.portalAdminClientes = window.portalAdminClientes || [];
  window.portalAdminPublicaciones = window.portalAdminPublicaciones || [];
  window.portalAdminEdicion = window.portalAdminEdicion || { publicaciones: [], documentos: [] };

  function setMessage(id, text, isError) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || '';
    el.className = isError ? 'message error' : 'message';
  }

  function loginClienteUi() {
    console.log('login iniciado');
    setMessage('loginMensaje', 'Validando acceso...');
    google.script.run
      .withSuccessHandler(function(res) {
        console.log('respuesta loginCliente', res);
        if (!res || !res.ok) {
          setMessage('loginMensaje', res && res.mensaje ? res.mensaje : 'No se pudo ingresar.', true);
          return;
        }
        console.log('token portal cliente', res.cliente && res.cliente.token ? 'recibido' : 'sin token');
        window.portalSession = res.cliente;
        sessionStorage.setItem('portalCliente', JSON.stringify(res.cliente));
        mostrarPanelCliente();
        iniciarPortalCliente();
      })
      .withFailureHandler(function(error) {
        console.error('error loginCliente', error);
        setMessage('loginMensaje', error.message || String(error), true);
      })
      .loginCliente(
        document.getElementById('loginCuit').value,
        document.getElementById('loginEmail').value,
        document.getElementById('loginClave').value
      );
  }

  function inicializarPantallaCliente() {
    console.log('inicializarPantallaCliente');
    mostrarLoginCliente();

    try {
      const params = new URLSearchParams(window.location.search || '');
      if (params.get('logout') === '1' || params.get('forceLogin') === '1') {
        console.log('logout detectado');
        limpiarDatosSesionPortal();
        mostrarLoginCliente();
        setMessage('loginMensaje', 'Ingresa nuevamente para continuar.');
        return;
      }

      const raw = sessionStorage.getItem('portalCliente');
      if (!raw) return;

      const cliente = JSON.parse(raw);
      if (!cliente || !cliente.idPortalCliente || !cliente.token) return;

      window.portalSession = cliente;
      mostrarPanelCliente();
      iniciarPortalCliente();
    } catch (error) {
      console.error('error recuperando sesion portal', error);
      limpiarDatosSesionPortal();
      mostrarLoginCliente();
      setMessage('loginMensaje', 'No se pudo recuperar la sesion. Volve a ingresar.', true);
    }
  }

  function mostrarLoginCliente() {
    console.log('mostrando login');
    const login = document.getElementById('clienteLoginPanel');
    const panel = document.getElementById('clientePanel');
    if (login) login.classList.remove('hidden');
    if (panel) panel.classList.add('hidden');
  }

  function mostrarPanelCliente() {
    console.log('mostrando panel');
    const login = document.getElementById('clienteLoginPanel');
    const panel = document.getElementById('clientePanel');
    if (login) login.classList.add('hidden');
    if (panel) panel.classList.remove('hidden');
  }

  function limpiarDatosSesionPortal() {
    window.portalSession = null;
    sessionStorage.removeItem('portalCliente');
    sessionStorage.removeItem('portalToken');
    sessionStorage.removeItem('idPortalCliente');
    console.log('sesion limpiada');
  }

  function limpiarMensajesPanelCliente() {
    const detalle = document.getElementById('clienteDetalle');
    if (detalle) {
      detalle.textContent = '';
      detalle.className = 'muted';
    }
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (target) target.innerHTML = '<p class="muted">Sin datos publicados.</p>';
    });
  }

  function iniciarPortalCliente() {
    try {
      console.log('iniciarPortalCliente ejecutado');
      asegurarLayoutCliente();
      const cliente = window.portalSession || JSON.parse(sessionStorage.getItem('portalCliente') || 'null');
      console.log('sesion portal cliente', cliente);
      console.log('token portal cliente', cliente && cliente.token ? 'disponible' : 'faltante');

      if (!cliente || !cliente.idPortalCliente || !cliente.token) {
        mostrarErrorPortalCliente('La sesion esta incompleta. Volve a iniciar sesion.');
        return;
      }

      document.getElementById('clienteNombre').textContent = cliente.nombreFantasia || cliente.razonSocial || 'Cliente';
      document.getElementById('clienteDetalle').textContent = (cliente.cuit || '') + ' - ' + (cliente.email || '');
      cargarBloqueCliente('listaPublicaciones', 'obtenerPublicacionesCliente', cliente.idPortalCliente, cliente.token, renderPublicacion, 'publicaciones');
      cargarBloqueCliente('listaMonitoreos', 'obtenerMonitoreosCliente', cliente.idPortalCliente, cliente.token, renderMonitoreo, 'monitoreos');
      cargarBloqueCliente('listaDocumentos', 'obtenerDocumentosCliente', cliente.idPortalCliente, cliente.token, renderDocumento, 'documentos');
    } catch (error) {
      console.error('error iniciarPortalCliente', error);
      mostrarErrorPortalCliente(error.message || String(error));
    }
  }

  function asegurarLayoutCliente() {
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (!target) return;
      if (id === 'listaPublicaciones') target.innerHTML = '<p class="muted">Cargando publicaciones...</p>';
      if (id === 'listaMonitoreos') target.innerHTML = '<p class="muted">Cargando monitoreos...</p>';
      if (id === 'listaDocumentos') target.innerHTML = '<p class="muted">Cargando documentos...</p>';
    });
  }

  function mostrarErrorPortalCliente(mensaje) {
    const detalle = document.getElementById('clienteDetalle');
    if (detalle) {
      detalle.textContent = mensaje || 'No se pudo cargar el portal.';
      detalle.className = 'message error';
    }
    ['listaPublicaciones', 'listaMonitoreos', 'listaDocumentos'].forEach(function(id) {
      const target = document.getElementById(id);
      if (target) target.innerHTML = '<p class="message error">' + esc(mensaje || 'No disponible.') + '</p>';
    });
  }

  function cargarBloqueCliente(targetId, fn, idPortalCliente, token, renderer, label) {
    const target = document.getElementById(targetId);
    if (!target) {
      console.error('No existe contenedor', targetId);
      return;
    }

    target.innerHTML = '<p class="muted">Cargando ' + esc(label || 'datos') + '...</p>';
    google.script.run
      .withSuccessHandler(function(res) {
        console.log(label || fn, res);
        if (!res || !res.ok) {
          target.innerHTML = '<p class="message error">' + esc(res && res.mensaje ? res.mensaje : 'No disponible.') + '</p>';
          return;
        }
        const items = res.items || [];
        target.innerHTML = items.length ? items.map(function(item) {
          try {
            return renderer(item);
          } catch (error) {
            console.error('error render ' + (label || fn), error, item);
            return '<article class="item"><strong>Error al mostrar registro</strong><small>' + esc(error.message || String(error)) + '</small></article>';
          }
        }).join('') : '<p class="muted">Sin datos publicados.</p>';
      })
      .withFailureHandler(function(error) {
        console.error('error ' + (label || fn), error);
        target.innerHTML = '<p class="message error">' + esc(error.message || String(error)) + '</p>';
      })[fn](idPortalCliente, token);
  }

  function renderPublicacion(item) {
    const subtitulo = [item.FECHA_VISITA, item.SUCURSAL, item.TIPO_SERVICIO].filter(Boolean).join(' - ');
    const resumen = item.RESUMEN_CLIENTE || item.CONTENIDO || '';
    return '<article class="item"><strong>' + esc(item.TITULO || 'Publicacion') + '</strong><small>' +
      esc(subtitulo || item.CATEGORIA || item.FECHA_PUBLICACION || '') + '</small><p>' + esc(resumen) + '</p></article>';
  }

  function renderMonitoreo(item) {
    return '<article class="item"><strong>' + esc(item.FECHA || '') + ' - ' + esc(item.SECTOR || '') +
      '</strong><small>' + esc(item.PUNTO_CONTROL || item.TIPO || '') + '</small><p>' + esc(item.RESULTADO || '') +
      '</p><small>' + esc(item.NOVEDAD || item.ACCION_CORRECTIVA || item.OBSERVACIONES || '') + '</small></article>';
  }

  function renderDocumento(item) {
    const url = item.URL || '';
    return '<article class="item"><strong>' + esc(item.TITULO || 'Documento') + '</strong><small>' +
      esc(item.TIPO || '') + '</small><p>' + esc(item.DESCRIPCION || '') +
      '</p>' + (url ? '<a href="' + esc(url) + '" target="_blank">Abrir documento</a>' : '<small>Sin URL disponible</small>') + '</article>';
  }

  function limpiarSesionCliente() {
    cerrarSesionCliente();
  }

  function cerrarSesionCliente() {
    limpiarDatosSesionPortal();
    limpiarMensajesPanelCliente();
    mostrarLoginCliente();
    setMessage('loginMensaje', 'Sesion cerrada.');
  }

  function inicializarPantallaAdmin() {
    console.log('inicializarPantallaAdmin');
    const token = sessionStorage.getItem('portalAdminToken');
    if (token) {
      window.portalAdminToken = token;
      mostrarPanelAdmin();
      recargarAdminListas();
      return;
    }
    mostrarLoginAdmin();
  }

  function mostrarLoginAdmin() {
    const login = document.getElementById('adminLoginPanel');
    const panel = document.getElementById('adminAppPanel');
    if (login) login.classList.remove('hidden');
    if (panel) panel.classList.add('hidden');
  }

  function mostrarPanelAdmin() {
    const login = document.getElementById('adminLoginPanel');
    const panel = document.getElementById('adminAppPanel');
    if (login) login.classList.add('hidden');
    if (panel) panel.classList.remove('hidden');
  }

  function loginAdminUi(event) {
    event.preventDefault();
    setMessage('adminLoginMensaje', 'Validando PIN...');
    google.script.run
      .withSuccessHandler(function(res) {
        console.log('respuesta loginAdmin', res);
        if (!res || !res.ok) {
          setMessage('adminLoginMensaje', res && res.mensaje ? res.mensaje : 'No se pudo ingresar.', true);
          return;
        }

        window.portalAdminToken = res.token;
        sessionStorage.setItem('portalAdminToken', res.token);
        setMessage('adminLoginMensaje', '');
        mostrarPanelAdmin();
        mostrarAdminTab('clientes');
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        console.error('error loginAdmin', error);
        setMessage('adminLoginMensaje', error.message || String(error), true);
      })
      .loginAdmin(document.getElementById('adminPin').value);
  }

  function cerrarSesionAdmin() {
    window.portalAdminToken = null;
    sessionStorage.removeItem('portalAdminToken');
    setMessage('adminMensaje', '');
    setMessage('adminLoginMensaje', 'Sesion admin cerrada.');
    mostrarLoginAdmin();
  }

  function obtenerAdminToken() {
    return window.portalAdminToken || sessionStorage.getItem('portalAdminToken') || '';
  }

  function mostrarAdminTab(tab) {
    Array.prototype.forEach.call(document.querySelectorAll('.admin-tab-panel'), function(panel) {
      panel.classList.add('hidden');
    });
    Array.prototype.forEach.call(document.querySelectorAll('.admin-tab'), function(button) {
      button.classList.toggle('active', button.dataset.adminTab === tab);
    });

    const target = document.getElementById('adminTab-' + tab);
    if (target) target.classList.remove('hidden');
  }

  function recargarAdminListas() {
    cargarClientesAdmin();
    cargarPublicacionesAdmin();
  }

  function cargarClientesAdmin() {
    const target = document.getElementById('adminClientesLista');
    if (!target) return;
    target.innerHTML = '<p class="muted">Cargando clientes...</p>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.innerHTML = '<p class="message error">' + esc(res && res.mensaje ? res.mensaje : 'No se pudieron cargar clientes.') + '</p>';
          return;
        }
        const clientes = res.clientes || [];
        window.portalAdminClientes = clientes;
        target.innerHTML = clientes.length ? clientes.map(renderClienteAdmin).join('') : '<p class="muted">Sin clientes cargados.</p>';
        actualizarSelectsClientesAdmin();
      })
      .withFailureHandler(function(error) {
        target.innerHTML = '<p class="message error">' + esc(error.message || String(error)) + '</p>';
      })
      .listarClientesPortalAdmin(obtenerAdminToken());
  }

  function cargarPublicacionesAdmin() {
    const target = document.getElementById('adminPublicacionesLista');
    if (!target) return;
    target.innerHTML = '<p class="muted">Cargando publicaciones...</p>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.innerHTML = '<p class="message error">' + esc(res && res.mensaje ? res.mensaje : 'No se pudieron cargar publicaciones.') + '</p>';
          return;
        }
        const publicaciones = res.publicaciones || [];
        window.portalAdminPublicaciones = publicaciones;
        target.innerHTML = publicaciones.length ? publicaciones.map(renderPublicacionAdmin).join('') : '<p class="muted">Sin publicaciones cargadas.</p>';
        actualizarSelectsPublicacionesDependientes();
      })
      .withFailureHandler(function(error) {
        target.innerHTML = '<p class="message error">' + esc(error.message || String(error)) + '</p>';
      })
      .listarPublicacionesPortalAdmin(obtenerAdminToken());
  }

  function renderClienteAdmin(item) {
    return '<article class="item"><strong>' + esc(item.idPortalCliente || 'Sin ID') + '</strong><small>' +
      esc(item.razonSocial || item.nombreFantasia || '') + '</small><p>' + esc(item.cuit || '') +
      ' - ' + esc(item.emailPrincipal || '') + '</p><small>Activo: ' + esc(item.activo || '') + '</small></article>';
  }

  function renderPublicacionAdmin(item) {
    return '<article class="item"><strong>' + esc(item.idPublicacion || 'Sin ID') + '</strong><small>' +
      esc(item.titulo || '') + '</small><p>ID cliente: ' + esc(item.idPortalCliente || '') +
      '</p><small>Visible: ' + esc(item.visible || '') + ' - ' + esc(item.fechaCarga || '') + '</small></article>';
  }

  function actualizarSelectsClientesAdmin() {
    const clientes = window.portalAdminClientes || [];
    const ids = ['selectClienteUsuario', 'selectClientePublicacion', 'selectClienteMonitoreo', 'selectClienteDocumento', 'selectClienteVista', 'selectClienteVisibilidad', 'selectClienteEdicion'];
    ids.forEach(function(id) {
      const select = document.getElementById(id);
      if (!select) return;
      const valorActual = select.value;
      select.innerHTML = '';

      if (!clientes.length) {
        select.appendChild(crearOption('', 'No hay clientes cargados. Primero cargá un cliente.'));
        select.disabled = true;
        return;
      }

      select.disabled = false;
      select.appendChild(crearOption('', 'Seleccioná un cliente'));
      clientes.forEach(function(cliente) {
        select.appendChild(crearOption(cliente.idPortalCliente, textoClienteAdmin(cliente)));
      });

      if (valorActual && clientes.some(function(cliente) { return cliente.idPortalCliente === valorActual; })) {
        select.value = valorActual;
      }
    });

    completarCuitUsuarioDesdeCliente();
    actualizarSelectsPublicacionesDependientes();
  }

  function limpiarVistaClienteAdmin() {
    const target = document.getElementById('vistaClienteResultado');
    if (!target) return;
    target.innerHTML = '<article class="panel"><h3>Datos del cliente</h3><p class="muted">Toc&aacute; "Ver datos del cliente" para cargar la vista.</p></article>';
  }

  function cargarVistaClienteAdmin() {
    const select = document.getElementById('selectClienteVista');
    const target = document.getElementById('vistaClienteResultado');
    const token = obtenerAdminToken();
    if (!select || !target) return;

    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    if (!select.value) {
      target.innerHTML = '<article class="panel"><h3>Datos del cliente</h3><p class="message error">Seleccion&aacute; un cliente.</p></article>';
      return;
    }

    target.innerHTML = '<article class="panel"><h3>Vista cliente</h3><p class="muted">Cargando datos visibles...</p></article>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.innerHTML = '<article class="panel"><h3>Vista cliente</h3><p class="message error">' +
            esc(res && res.mensaje ? res.mensaje : 'No se pudo cargar la vista.') + '</p></article>';
          return;
        }
        target.innerHTML = renderVistaClienteAdmin(res);
      })
      .withFailureHandler(function(error) {
        target.innerHTML = '<article class="panel"><h3>Vista cliente</h3><p class="message error">' +
          esc(error.message || String(error)) + '</p></article>';
      })
      .obtenerVistaClienteAdmin(select.value, token);
  }

  function renderVistaClienteAdmin(data) {
    const cliente = data.cliente || {};
    return [
      renderVistaClienteDatos(cliente),
      renderVistaClientePublicaciones(data.publicaciones || []),
      renderVistaClienteMonitoreos(data.monitoreos || []),
      renderVistaClienteDocumentos(data.documentos || [])
    ].join('');
  }

  function renderVistaClienteDatos(cliente) {
    const nombre = cliente.razonSocial || cliente.nombreFantasia || 'Cliente';
    return '<article class="panel"><span class="eyebrow">Cliente</span><h3>' + esc(nombre) +
      '</h3><p><strong>ID:</strong> ' + esc(cliente.idPortalCliente || '') + '</p><p><strong>CUIT:</strong> ' +
      esc(cliente.cuit || '') + '</p><p><strong>Email:</strong> ' + esc(cliente.emailPrincipal || '') +
      '</p><p><strong>Tel&eacute;fono:</strong> ' + esc(cliente.telefono || '') + '</p><p><strong>Direcci&oacute;n:</strong> ' +
      esc(cliente.direccion || '') + '</p></article>';
  }

  function renderVistaClientePublicaciones(publicaciones) {
    if (!publicaciones.length) {
      return '<article class="panel"><h3>Publicaciones visibles</h3><p class="muted">Sin publicaciones visibles.</p></article>';
    }

    return '<article class="panel"><h3>Publicaciones visibles</h3><div class="list">' + publicaciones.map(function(item) {
      const meta = [item.fechaVisita, item.tipoServicio, item.sucursal].filter(Boolean).join(' — ');
      return '<div class="item"><strong>' + esc(item.titulo || 'Publicacion') + '</strong><small>' +
        esc(meta || item.categoria || '') + '</small><p>' + esc(item.resumenCliente || item.contenido || '') +
        '</p></div>';
    }).join('') + '</div></article>';
  }

  function renderVistaClienteMonitoreos(monitoreos) {
    if (!monitoreos.length) {
      return '<article class="panel"><h3>Monitoreos visibles</h3><p class="muted">Sin monitoreos visibles.</p></article>';
    }

    return '<article class="panel"><h3>Monitoreos visibles</h3><div class="list">' + monitoreos.map(function(item) {
      const meta = [item.fecha, item.sector, item.puntoControl, item.tipo].filter(Boolean).join(' — ');
      return '<div class="item"><strong>' + esc(meta || 'Monitoreo') + '</strong><p>' +
        esc(item.resultado || '') + '</p><small>' + esc([item.novedad, item.accionCorrectiva, item.observaciones].filter(Boolean).join(' - ')) +
        '</small></div>';
    }).join('') + '</div></article>';
  }

  function renderVistaClienteDocumentos(documentos) {
    if (!documentos.length) {
      return '<article class="panel"><h3>Documentos visibles</h3><p class="muted">Sin documentos visibles.</p></article>';
    }

    return '<article class="panel"><h3>Documentos visibles</h3><div class="list">' + documentos.map(function(item) {
      const link = item.url
        ? '<a class="doc-link" href="' + esc(item.url) + '" target="_blank" rel="noopener">Abrir documento</a>'
        : '<small>Sin URL disponible</small>';
      return '<div class="item"><strong>' + esc(item.titulo || 'Documento') + '</strong><small>' +
        esc(item.tipo || '') + '</small><p>' + esc(item.descripcion || '') + '</p>' + link + '</div>';
    }).join('') + '</div></article>';
  }

  function limpiarGestionVisibilidadAdmin() {
    const target = document.getElementById('gestionVisibilidadResultado');
    if (!target) return;
    target.innerHTML = '<article class="panel"><h3>Registros del cliente</h3><p class="muted">Toc&aacute; "Cargar registros" para gestionar visibilidad.</p></article>';
  }

  function cargarGestionVisibilidadAdmin() {
    const select = document.getElementById('selectClienteVisibilidad');
    const target = document.getElementById('gestionVisibilidadResultado');
    const token = obtenerAdminToken();
    if (!select || !target) return;

    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    if (!select.value) {
      target.innerHTML = '<article class="panel"><h3>Registros del cliente</h3><p class="message error">Seleccion&aacute; un cliente.</p></article>';
      return;
    }

    target.innerHTML = '<article class="panel"><h3>Gestionar visibilidad</h3><p class="muted">Cargando registros...</p></article>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.innerHTML = '<article class="panel"><h3>Gestionar visibilidad</h3><p class="message error">' +
            esc(res && res.mensaje ? res.mensaje : 'No se pudo cargar la gestion.') + '</p></article>';
          return;
        }
        target.innerHTML = renderGestionVisibilidadAdmin(res);
      })
      .withFailureHandler(function(error) {
        target.innerHTML = '<article class="panel"><h3>Gestionar visibilidad</h3><p class="message error">' +
          esc(error.message || String(error)) + '</p></article>';
      })
      .obtenerGestionClienteAdmin(select.value, token);
  }

  function renderGestionVisibilidadAdmin(data) {
    const cliente = data.cliente || {};
    return [
      renderGestionClienteDatos(cliente),
      renderGestionGrupoVisibilidad('Publicaciones', 'publicacion', data.publicaciones || []),
      renderGestionGrupoVisibilidad('Monitoreos', 'monitoreo', data.monitoreos || []),
      renderGestionGrupoVisibilidad('Documentos', 'documento', data.documentos || [])
    ].join('');
  }

  function renderGestionClienteDatos(cliente) {
    const nombre = cliente.razonSocial || cliente.nombreFantasia || 'Cliente';
    return '<article class="panel"><span class="eyebrow">Cliente</span><h3>' + esc(nombre) +
      '</h3><p><strong>ID:</strong> ' + esc(cliente.idPortalCliente || '') + '</p><p><strong>CUIT:</strong> ' +
      esc(cliente.cuit || '') + '</p><p><strong>Email:</strong> ' + esc(cliente.emailPrincipal || '') + '</p></article>';
  }

  function renderGestionGrupoVisibilidad(titulo, tipo, items) {
    if (!items.length) {
      return '<article class="panel"><h3>' + esc(titulo) + '</h3><p class="muted">Sin registros para mostrar.</p></article>';
    }

    return '<article class="panel"><h3>' + esc(titulo) + '</h3><div class="list">' + items.map(function(item) {
      return renderGestionItemVisibilidad(tipo, item);
    }).join('') + '</div></article>';
  }

  function renderGestionItemVisibilidad(tipo, item) {
    const visible = String(item.visible || '').toUpperCase() === 'SI' ? 'SI' : 'NO';
    const nuevoValor = visible === 'SI' ? 'NO' : 'SI';
    const accion = visible === 'SI' ? 'Ocultar' : 'Publicar';
    const link = item.url ? '<a class="doc-link secondary-doc-link" href="' + esc(item.url) + '" target="_blank" rel="noopener">Abrir documento</a>' : '';
    return '<div class="item visibility-item"><div><strong>' + esc(item.titulo || item.id || 'Registro') +
      '</strong><small>' + esc([item.fecha, item.detalle, item.id].filter(Boolean).join(' - ')) +
      '</small><p>' + esc(item.resumen || '') + '</p><span class="visibility-pill visibility-' + esc(visible.toLowerCase()) +
      '">Visible: ' + esc(visible) + '</span>' + link + '</div><button type="button" class="secondary-button" onclick="cambiarVisibleAdmin(\'' +
      esc(tipo) + '\', \'' + esc(item.id || '') + '\', \'' + esc(nuevoValor) + '\')">' + esc(accion) + '</button></div>';
  }

  function cambiarVisibleAdmin(tipo, id, visible) {
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    if (!id) {
      setMessage('adminMensaje', 'Falta ID del registro.', true);
      return;
    }

    const accion = visible === 'SI' ? 'publicar' : 'ocultar';
    if (!confirm('Confirmar ' + accion + ' este registro?')) return;

    const fnMap = {
      publicacion: 'cambiarVisiblePublicacionAdmin',
      monitoreo: 'cambiarVisibleMonitoreoAdmin',
      documento: 'cambiarVisibleDocumentoAdmin'
    };
    const fn = fnMap[tipo];
    if (!fn) {
      setMessage('adminMensaje', 'Tipo de registro no valido.', true);
      return;
    }

    setMessage('adminMensaje', 'Actualizando visibilidad...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo actualizar.', true);
          return;
        }
        setMessage('adminMensaje', res.mensaje || 'Visibilidad actualizada.');
        cargarGestionVisibilidadAdmin();
        cargarVistaClienteAdmin();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](id, visible, token);
  }

  function limpiarEdicionRegistrosAdmin() {
    window.portalAdminEdicion = { publicaciones: [], documentos: [] };
    const target = document.getElementById('edicionRegistrosResultado');
    if (!target) return;
    target.innerHTML = '<article class="panel"><h3>Registros editables</h3><p class="muted">Toc&aacute; "Cargar registros editables" para empezar.</p></article>';
  }

  function cargarEdicionRegistrosAdmin() {
    const select = document.getElementById('selectClienteEdicion');
    const target = document.getElementById('edicionRegistrosResultado');
    const token = obtenerAdminToken();
    if (!select || !target) return;

    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    if (!select.value) {
      target.innerHTML = '<article class="panel"><h3>Registros editables</h3><p class="message error">Seleccion&aacute; un cliente.</p></article>';
      return;
    }

    target.innerHTML = '<article class="panel"><h3>Editar registros</h3><p class="muted">Cargando publicaciones y documentos...</p></article>';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          target.innerHTML = '<article class="panel"><h3>Editar registros</h3><p class="message error">' +
            esc(res && res.mensaje ? res.mensaje : 'No se pudieron cargar registros.') + '</p></article>';
          return;
        }
        window.portalAdminEdicion = {
          publicaciones: res.publicaciones || [],
          documentos: res.documentos || []
        };
        target.innerHTML = renderEdicionRegistrosAdmin(res);
      })
      .withFailureHandler(function(error) {
        target.innerHTML = '<article class="panel"><h3>Editar registros</h3><p class="message error">' +
          esc(error.message || String(error)) + '</p></article>';
      })
      .obtenerGestionClienteAdmin(select.value, token);
  }

  function renderEdicionRegistrosAdmin(data) {
    const cliente = data.cliente || {};
    return [
      renderGestionClienteDatos(cliente),
      renderEdicionGrupoPublicaciones(data.publicaciones || []),
      renderEdicionGrupoDocumentos(data.documentos || [])
    ].join('');
  }

  function renderEdicionGrupoPublicaciones(items) {
    if (!items.length) {
      return '<article class="panel"><h3>Publicaciones / visitas</h3><p class="muted">Sin publicaciones para editar.</p></article>';
    }

    return '<article class="panel"><h3>Publicaciones / visitas</h3><div class="list">' + items.map(function(item, index) {
      return '<div class="item"><strong>' + esc(item.titulo || item.id || 'Publicacion') + '</strong><small>' +
        esc([item.fecha, item.detalle, item.id].filter(Boolean).join(' - ')) +
        '</small><p>' + esc(item.resumen || '') + '</p><span class="visibility-pill visibility-' +
        esc(String(item.visible || 'NO').toLowerCase()) + '">Visible: ' + esc(item.visible || 'NO') +
        '</span><div id="editor-publicacion-' + index + '" class="edit-box hidden"></div><div class="edit-actions"><button type="button" class="secondary-button" onclick="abrirEditorPublicacionAdmin(' +
        index + ')">Editar</button></div></div>';
    }).join('') + '</div></article>';
  }

  function renderEdicionGrupoDocumentos(items) {
    if (!items.length) {
      return '<article class="panel"><h3>Documentos / PDFs</h3><p class="muted">Sin documentos para editar.</p></article>';
    }

    return '<article class="panel"><h3>Documentos / PDFs</h3><div class="list">' + items.map(function(item, index) {
      const link = item.url ? '<a class="doc-link secondary-doc-link" href="' + esc(item.url) + '" target="_blank" rel="noopener">Abrir documento</a>' : '';
      return '<div class="item"><strong>' + esc(item.titulo || item.id || 'Documento') + '</strong><small>' +
        esc([item.fecha, item.detalle, item.id].filter(Boolean).join(' - ')) +
        '</small><p>' + esc(item.resumen || '') + '</p><span class="visibility-pill visibility-' +
        esc(String(item.visible || 'NO').toLowerCase()) + '">Visible: ' + esc(item.visible || 'NO') +
        '</span>' + link + '<div id="editor-documento-' + index + '" class="edit-box hidden"></div><div class="edit-actions"><button type="button" class="secondary-button" onclick="abrirEditorDocumentoAdmin(' +
        index + ')">Editar</button></div></div>';
    }).join('') + '</div></article>';
  }

  function abrirEditorPublicacionAdmin(index) {
    const item = (window.portalAdminEdicion.publicaciones || [])[index];
    const target = document.getElementById('editor-publicacion-' + index);
    if (!item || !target) return;

    target.classList.remove('hidden');
    target.innerHTML = '<div class="form-grid">' +
      '<label>Fecha visita<input name="fechaVisita" type="date" value="' + esc(item.fechaVisita || '') + '"></label>' +
      '<label>Sucursal<input name="sucursal" value="' + esc(item.sucursal || '') + '"></label>' +
      '<label>Tipo servicio<input name="tipoServicio" value="' + esc(item.tipoServicio || '') + '"></label>' +
      '<label>Titulo<input name="titulo" value="' + esc(item.titulo || '') + '"></label>' +
      '<label>Categoria<input name="categoria" value="' + esc(item.categoria || '') + '"></label>' +
      '<label>Estado publicacion<input name="estadoPublicacion" value="' + esc(item.estadoPublicacion || '') + '"></label>' +
      '<label>Visible<select name="visible"><option value="SI"' + selectedIf(item.visible, 'SI') + '>SI</option><option value="NO"' + selectedIf(item.visible, 'NO') + '>NO</option></select></label>' +
      '</div><label>Resumen cliente<textarea name="resumenCliente">' + esc(item.resumenCliente || '') +
      '</textarea></label><label>Contenido<textarea name="contenido">' + esc(item.contenido || '') +
      '</textarea></label><div class="edit-actions"><button type="button" onclick="guardarEdicionPublicacionAdmin(' +
      index + ')">Guardar cambios</button><button type="button" class="secondary-button" onclick="cerrarEditorAdmin(\'editor-publicacion-' +
      index + '\')">Cancelar</button></div>';
  }

  function abrirEditorDocumentoAdmin(index) {
    const item = (window.portalAdminEdicion.documentos || [])[index];
    const target = document.getElementById('editor-documento-' + index);
    if (!item || !target) return;

    target.classList.remove('hidden');
    target.innerHTML = '<div class="form-grid">' +
      '<label>Titulo<input name="titulo" value="' + esc(item.titulo || '') + '"></label>' +
      '<label>Tipo<input name="tipo" value="' + esc(item.detalle || '') + '"></label>' +
      '<label>URL<input name="url" value="' + esc(item.url || '') + '"></label>' +
      '<label>Carpeta Drive ID<input name="carpetaDriveId" value="' + esc(item.carpetaDriveId || '') + '"></label>' +
      '<label>Visible<select name="visible"><option value="SI"' + selectedIf(item.visible, 'SI') + '>SI</option><option value="NO"' + selectedIf(item.visible, 'NO') + '>NO</option></select></label>' +
      '</div><label>Descripcion<textarea name="descripcion">' + esc(item.descripcion || item.resumen || '') +
      '</textarea></label><div class="edit-actions"><button type="button" onclick="guardarEdicionDocumentoAdmin(' +
      index + ')">Guardar cambios</button><button type="button" class="secondary-button" onclick="cerrarEditorAdmin(\'editor-documento-' +
      index + '\')">Cancelar</button></div>';
  }

  function guardarEdicionPublicacionAdmin(index) {
    const item = (window.portalAdminEdicion.publicaciones || [])[index];
    const target = document.getElementById('editor-publicacion-' + index);
    if (!item || !target) return;
    guardarEdicionRegistroAdmin('actualizarPublicacionAdmin', item.id, target, 'Publicacion actualizada.');
  }

  function guardarEdicionDocumentoAdmin(index) {
    const item = (window.portalAdminEdicion.documentos || [])[index];
    const target = document.getElementById('editor-documento-' + index);
    if (!item || !target) return;
    guardarEdicionRegistroAdmin('actualizarDocumentoAdmin', item.id, target, 'Documento actualizado.');
  }

  function guardarEdicionRegistroAdmin(fn, id, editor, okMessage) {
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    const data = {};
    Array.prototype.forEach.call(editor.querySelectorAll('input, textarea, select'), function(el) {
      if (!el.name) return;
      data[el.name] = el.value;
    });

    setMessage('adminMensaje', 'Guardando cambios...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo actualizar.', true);
          return;
        }
        setMessage('adminMensaje', okMessage);
        cargarEdicionRegistrosAdmin();
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](id, data, token);
  }

  function cerrarEditorAdmin(id) {
    const target = document.getElementById(id);
    if (!target) return;
    target.innerHTML = '';
    target.classList.add('hidden');
  }

  function selectedIf(actual, esperado) {
    return String(actual || '').toUpperCase() === esperado ? ' selected' : '';
  }

  function actualizarSelectsPublicacionesDependientes() {
    actualizarSelectPublicacionesPorCliente('selectClienteMonitoreo', 'selectPublicacionMonitoreo', false);
    actualizarSelectPublicacionesPorCliente('selectClienteDocumento', 'selectPublicacionDocumento', true);
  }

  function actualizarSelectPublicacionesPorCliente(clienteSelectId, publicacionSelectId, permiteVacio) {
    const clienteSelect = document.getElementById(clienteSelectId);
    const publicacionSelect = document.getElementById(publicacionSelectId);
    if (!clienteSelect || !publicacionSelect) return;

    const idCliente = clienteSelect.value;
    const publicaciones = (window.portalAdminPublicaciones || []).filter(function(publicacion) {
      return publicacion.idPortalCliente === idCliente;
    });
    const valorActual = publicacionSelect.value;
    publicacionSelect.innerHTML = '';

    if (permiteVacio) {
      publicacionSelect.appendChild(crearOption('', 'Documento general del cliente'));
    } else {
      publicacionSelect.appendChild(crearOption('', idCliente ? 'Seleccioná una publicacion' : 'Seleccioná un cliente primero'));
    }

    if (!idCliente) {
      publicacionSelect.disabled = !permiteVacio;
      return;
    }

    if (!publicaciones.length) {
      publicacionSelect.appendChild(crearOption('', 'Sin publicaciones para este cliente'));
      publicacionSelect.disabled = !permiteVacio;
      return;
    }

    publicacionSelect.disabled = false;
    publicaciones.forEach(function(publicacion) {
      publicacionSelect.appendChild(crearOption(publicacion.idPublicacion, textoPublicacionAdmin(publicacion)));
    });

    if (valorActual && publicaciones.some(function(publicacion) { return publicacion.idPublicacion === valorActual; })) {
      publicacionSelect.value = valorActual;
    }
  }

  function completarCuitUsuarioDesdeCliente() {
    const select = document.getElementById('selectClienteUsuario');
    if (!select) return;
    const form = select.form;
    if (!form || !form.elements.cuit) return;
    const cliente = obtenerClienteAdminPorId(select.value);
    if (cliente && cliente.cuit) {
      form.elements.cuit.value = cliente.cuit;
    }
  }

  function obtenerClienteAdminPorId(idPortalCliente) {
    return (window.portalAdminClientes || []).find(function(cliente) {
      return cliente.idPortalCliente === idPortalCliente;
    }) || null;
  }

  function textoClienteAdmin(cliente) {
    const nombre = cliente.razonSocial || cliente.nombreFantasia || 'Cliente sin nombre';
    return nombre + ' — CUIT ' + (cliente.cuit || 'sin CUIT') + ' — ' + cliente.idPortalCliente;
  }

  function textoPublicacionAdmin(publicacion) {
    return [
      publicacion.fechaVisita || publicacion.fechaCarga || 'Sin fecha',
      publicacion.tipoServicio || publicacion.titulo || 'Sin tipo',
      publicacion.sucursal || 'Sin sucursal',
      publicacion.idPublicacion
    ].join(' — ');
  }

  function crearOption(value, text) {
    const option = document.createElement('option');
    option.value = value || '';
    option.textContent = text || '';
    return option;
  }

  function crearClientePortalUi(event) {
    enviarAdminForm(event, 'crearClientePortalAdmin', 'Cliente creado.');
  }

  function crearUsuarioPortalUi(event) {
    enviarAdminForm(event, 'crearUsuarioPortalAdmin', 'Usuario creado.');
  }

  function crearPublicacionUi(event) {
    enviarAdminForm(event, 'crearPublicacionAdmin', 'Publicacion creada.');
  }

  function crearMonitoreoUi(event) {
    enviarAdminForm(event, 'crearMonitoreoAdmin', 'Monitoreo creado.');
  }

  function crearDocumentoUi(event) {
    enviarAdminForm(event, 'crearDocumentoAdmin', 'Documento creado.');
  }

  function enviarAdminForm(event, fn, okMessage) {
    event.preventDefault();
    const form = event.target;
    const token = obtenerAdminToken();
    if (!token) {
      setMessage('adminMensaje', 'Primero ingresa con PIN admin.', true);
      mostrarLoginAdmin();
      return;
    }

    setMessage('adminMensaje', 'Guardando...');
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.ok) {
          setMessage('adminMensaje', res && res.mensaje ? res.mensaje : 'No se pudo guardar.', true);
          return;
        }
        form.reset();
        setMessage('adminMensaje', okMessage + ' ID: ' + res.id);
        recargarAdminListas();
      })
      .withFailureHandler(function(error) {
        setMessage('adminMensaje', error.message || String(error), true);
      })[fn](formToObject(form), token);
  }

  function esc(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
