<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap');

  :root {
    --bg: #f4f7f4;
    --panel: #ffffff;
    --text: #17331d;
    --muted: #5E7A63;
    --brand: #3A8E40;
    --brand-dark: #2A6D33;
    --brand-bright: #4FD159;
    --brand-soft: #9AF0A4;
    --line: #dfe7df;
    --line-strong: #C8C8C8;
    --danger: #b42318;
    --shadow: 0 18px 45px rgba(42, 109, 51, 0.12);
    --soft-shadow: 0 10px 28px rgba(42, 109, 51, 0.10);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Montserrat', Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(154, 240, 164, 0.24), transparent 34%),
      linear-gradient(180deg, #f8fbf8 0%, var(--bg) 100%);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    background: rgba(255, 255, 255, 0.94);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 8px 24px rgba(42, 109, 51, 0.06);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  h1, h2, h3 {
    margin: 0 0 10px;
    color: var(--brand-dark);
    letter-spacing: 0;
  }

  h1 { font-size: clamp(24px, 3vw, 34px); }
  h2 { font-size: clamp(22px, 2.5vw, 30px); }
  h3 { font-size: 19px; }

  .eyebrow {
    display: block;
    color: var(--brand);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-lockup {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, #ffffff 0%, #f2fbf3 100%);
    border: 1px solid var(--line);
    padding: 8px 10px;
  }

  .brand-mark {
    display: inline-grid;
    place-items: center;
    width: 42px;
    height: 42px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    color: #ffffff;
    font-size: 24px;
    font-weight: 800;
    box-shadow: 0 8px 18px rgba(58, 142, 64, 0.24);
  }

  .brand-text {
    display: grid;
    gap: 1px;
    line-height: 1.05;
    text-align: left;
  }

  .brand-name {
    color: var(--brand-dark);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .brand-subtitle {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .login-logo {
    justify-content: center;
    margin: 0 auto 16px;
  }

  .layout {
    padding: 24px;
    display: grid;
    gap: 18px;
  }

  .login-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--soft-shadow);
    padding: 22px;
  }

  .login-panel {
    width: min(430px, 100%);
    text-align: center;
    padding: 30px;
    border-top: 5px solid var(--brand);
    box-shadow: var(--shadow);
  }

  .login-panel label {
    text-align: left;
  }

  .client-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  label {
    display: grid;
    gap: 6px;
    margin: 10px 0;
    font-weight: 700;
    font-size: 13px;
  }

  .check {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input, textarea, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 13px;
    font: inherit;
    color: var(--text);
    background: #fbfdfb;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  input:focus,
  textarea:focus,
  select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 4px rgba(79, 209, 89, 0.18);
  }

  textarea {
    min-height: 92px;
    resize: vertical;
  }

  button {
    border: 0;
    border-radius: 999px;
    background: var(--brand);
    color: #fff;
    cursor: pointer;
    font-weight: 800;
    padding: 12px 18px;
    font-family: inherit;
    box-shadow: 0 10px 20px rgba(58, 142, 64, 0.22);
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  }

  button:hover {
    background: var(--brand-dark);
    transform: translateY(-1px);
    box-shadow: 0 14px 24px rgba(42, 109, 51, 0.25);
  }

  .secondary-button {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
    box-shadow: none;
  }

  .secondary-button:hover {
    background: #edf7ee;
    color: var(--brand-dark);
    border-color: var(--brand);
  }

  .message {
    color: var(--muted);
    font-weight: 700;
  }

  .message.error { color: var(--danger); }

  .muted { color: var(--muted); }

  .hidden { display: none !important; }

  .list {
    display: grid;
    gap: 10px;
  }

  .item {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #fbfdfb;
  }

  .item strong { display: block; }

  .item small {
    display: block;
    color: var(--muted);
    margin-top: 4px;
  }

  .login-help,
  .portal-footer {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }

  .login-help {
    margin: 16px 0 0;
  }

  .portal-footer {
    padding: 8px 2px 0;
    text-align: center;
  }

  .admin-layout {
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
  }

  .admin-welcome {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .admin-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .admin-tab {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
    box-shadow: none;
    padding: 10px 14px;
  }

  .admin-tab:hover,
  .admin-tab.active {
    background: var(--brand);
    color: #ffffff;
    border-color: var(--brand);
  }

  .admin-tab-panel {
    display: grid;
    gap: 18px;
  }

  .admin-form {
    display: grid;
    gap: 10px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px 14px;
  }

  .admin-preview-grid {
    display: grid;
    grid-template-columns: minmax(260px, 0.8fr) minmax(0, 1.2fr);
    gap: 18px;
  }

  .admin-preview-grid .panel:first-child {
    grid-row: span 3;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
    color: #ffffff;
    background: var(--brand);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 800;
    text-decoration: none;
  }

  .doc-link:hover {
    background: var(--brand-dark);
  }

  .secondary-doc-link {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
  }

  .visibility-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }

  .visibility-pill {
    display: inline-flex;
    margin-top: 6px;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 11px;
    font-weight: 800;
  }

  .visibility-si {
    color: var(--brand-dark);
    background: rgba(79, 209, 89, 0.18);
    border: 1px solid rgba(58, 142, 64, 0.28);
  }

  .visibility-no {
    color: var(--danger);
    background: rgba(180, 35, 24, 0.08);
    border: 1px solid rgba(180, 35, 24, 0.18);
  }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .client-summary { align-items: flex-start; flex-direction: column; }
    .admin-welcome { align-items: flex-start; flex-direction: column; }
    .form-grid { grid-template-columns: 1fr; }
    .admin-preview-grid { grid-template-columns: 1fr; }
    .admin-preview-grid .panel:first-child { grid-row: auto; }
    .visibility-item { flex-direction: column; }
  }
</style>
