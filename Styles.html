<style>
  :root {
    --bg: #eef3f2;
    --panel: #ffffff;
    --text: #16302b;
    --muted: #667a75;
    --brand: #00876c;
    --brand-dark: #075f50;
    --line: #d7e2df;
    --danger: #b42318;
    --shadow: 0 18px 45px rgba(17, 42, 36, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }

  h1, h2, h3 { margin: 0 0 10px; }

  .eyebrow {
    display: block;
    color: var(--brand);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .layout {
    padding: 24px;
    display: grid;
    gap: 18px;
  }

  .login-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .login-panel {
    width: min(420px, 100%);
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  label {
    display: grid;
    gap: 6px;
    margin: 10px 0;
    font-weight: 700;
    font-size: 13px;
  }

  .check {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input, textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 11px;
    font: inherit;
  }

  textarea {
    min-height: 92px;
    resize: vertical;
  }

  button {
    border: 0;
    border-radius: 6px;
    background: var(--brand);
    color: #fff;
    cursor: pointer;
    font-weight: 800;
    padding: 10px 14px;
  }

  button:hover { background: var(--brand-dark); }

  .message {
    color: var(--muted);
    font-weight: 700;
  }

  .message.error { color: var(--danger); }

  .muted { color: var(--muted); }

  .hidden { display: none !important; }

  .list {
    display: grid;
    gap: 10px;
  }

  .item {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px;
    background: #f9fbfa;
  }

  .item strong { display: block; }

  .item small {
    display: block;
    color: var(--muted);
    margin-top: 4px;
  }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr; }
    .topbar { align-items: flex-start; flex-direction: column; }
  }
</style>
