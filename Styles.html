<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap');

  :root {
    --bg: #f4f7f4;
    --panel: #ffffff;
    --text: #17331d;
    --muted: #5E7A63;
    --brand: #3A8E40;
    --brand-dark: #2A6D33;
    --brand-bright: #4FD159;
    --brand-soft: #9AF0A4;
    --line: #dfe7df;
    --line-strong: #C8C8C8;
    --danger: #b42318;
    --shadow: 0 18px 45px rgba(42, 109, 51, 0.12);
    --soft-shadow: 0 10px 28px rgba(42, 109, 51, 0.10);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Montserrat', Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(154, 240, 164, 0.24), transparent 34%),
      linear-gradient(180deg, #f8fbf8 0%, var(--bg) 100%);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    background: rgba(255, 255, 255, 0.94);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 8px 24px rgba(42, 109, 51, 0.06);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  h1, h2, h3 {
    margin: 0 0 10px;
    color: var(--brand-dark);
    letter-spacing: 0;
  }

  h1 { font-size: clamp(24px, 3vw, 34px); }
  h2 { font-size: clamp(22px, 2.5vw, 30px); }
  h3 { font-size: 19px; }

  .eyebrow {
    display: block;
    color: var(--brand);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-lockup {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, #ffffff 0%, #f2fbf3 100%);
    border: 1px solid var(--line);
    padding: 8px 10px;
  }

  .brand-mark {
    display: inline-grid;
    place-items: center;
    width: 42px;
    height: 42px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    color: #ffffff;
    font-size: 24px;
    font-weight: 800;
    box-shadow: 0 8px 18px rgba(58, 142, 64, 0.24);
  }

  .brand-text {
    display: grid;
    gap: 1px;
    line-height: 1.05;
    text-align: left;
  }

  .brand-name {
    color: var(--brand-dark);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .brand-subtitle {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .login-logo {
    justify-content: center;
    margin: 0 auto 16px;
  }

  .layout {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0;
    display: grid;
    gap: 18px;
  }

  .login-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--soft-shadow);
    padding: 22px;
  }

  .login-panel {
    width: min(430px, 100%);
    text-align: center;
    padding: 30px;
    border-top: 5px solid var(--brand);
    box-shadow: var(--shadow);
  }

  .login-panel label {
    text-align: left;
  }

  .client-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  label {
    display: grid;
    gap: 6px;
    margin: 10px 0;
    font-weight: 700;
    font-size: 13px;
  }

  .check {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input, textarea, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 13px;
    font: inherit;
    color: var(--text);
    background: #fbfdfb;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  input:focus,
  textarea:focus,
  select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 4px rgba(79, 209, 89, 0.18);
  }

  textarea {
    min-height: 92px;
    resize: vertical;
  }

  button {
    border: 0;
    border-radius: 999px;
    background: var(--brand);
    color: #fff;
    cursor: pointer;
    font-weight: 800;
    padding: 12px 18px;
    font-family: inherit;
    box-shadow: 0 10px 20px rgba(58, 142, 64, 0.22);
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  }

  button:hover {
    background: var(--brand-dark);
    transform: translateY(-1px);
    box-shadow: 0 14px 24px rgba(42, 109, 51, 0.25);
  }

  .secondary-button {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
    box-shadow: none;
  }

  .secondary-button:hover {
    background: #edf7ee;
    color: var(--brand-dark);
    border-color: var(--brand);
  }

  .message {
    color: var(--muted);
    font-weight: 700;
  }

  .message.error { color: var(--danger); }

  .muted { color: var(--muted); }

  .hidden { display: none !important; }

  .list {
    display: grid;
    gap: 10px;
  }

  .item {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #fbfdfb;
  }

  .item strong { display: block; }

  .item small {
    display: block;
    color: var(--muted);
    margin-top: 4px;
  }

  .login-help,
  .portal-footer {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }

  .login-help {
    margin: 16px 0 0;
  }

  .portal-footer {
    padding: 8px 2px 0;
    text-align: center;
  }

  .admin-layout {
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
  }

  .admin-welcome {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .admin-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .admin-tab {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
    box-shadow: none;
    padding: 10px 14px;
  }

  .admin-tab:hover,
  .admin-tab.active {
    background: var(--brand);
    color: #ffffff;
    border-color: var(--brand);
  }

  .admin-tab-panel {
    display: grid;
    gap: 18px;
  }

  .admin-form {
    display: grid;
    gap: 10px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px 14px;
  }

  .admin-preview-grid {
    display: grid;
    grid-template-columns: minmax(260px, 0.8fr) minmax(0, 1.2fr);
    gap: 18px;
  }

  .admin-preview-grid .panel:first-child {
    grid-row: span 3;
  }

  .doc-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
    color: #ffffff;
    background: var(--brand);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 800;
    text-decoration: none;
  }

  .doc-link:hover {
    background: var(--brand-dark);
  }

  .secondary-doc-link {
    background: #ffffff;
    color: var(--brand-dark);
    border: 1px solid var(--line-strong);
  }

  .visibility-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }

  .visibility-pill {
    display: inline-flex;
    margin-top: 6px;
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 11px;
    font-weight: 800;
  }

  .visibility-si {
    color: var(--brand-dark);
    background: rgba(79, 209, 89, 0.18);
    border: 1px solid rgba(58, 142, 64, 0.28);
  }

  .visibility-no {
    color: var(--danger);
    background: rgba(180, 35, 24, 0.08);
    border: 1px solid rgba(180, 35, 24, 0.18);
  }

  .edit-box {
    margin-top: 12px;
    border-top: 1px solid var(--line);
    padding-top: 12px;
  }

  .edit-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .inline-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
    margin: -4px 0 4px;
  }

  .service-wizard {
    gap: 16px;
  }

  .service-hero {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    background: linear-gradient(135deg, rgba(58, 142, 64, 0.10), #ffffff 58%);
  }

  .service-step {
    display: grid;
    gap: 14px;
  }

  .step-heading {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .step-heading > span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 68px;
    border-radius: 999px;
    padding: 7px 10px;
    color: #ffffff;
    background: var(--brand);
    font-size: 12px;
    font-weight: 800;
  }

  .step-heading h3 {
    margin: 0 0 3px;
  }

  .step-heading p {
    margin: 0;
    color: var(--muted);
  }

  .choice-box {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    background: #fbfdfb;
  }

  .choice-box legend {
    color: var(--brand-dark);
    font-weight: 800;
    padding: 0 6px;
  }

  .choice-box label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0;
  }

  .service-points {
    display: grid;
    gap: 12px;
    margin-top: 12px;
  }

  .service-point-card {
    background: #ffffff;
    border-color: rgba(58, 142, 64, 0.22);
    box-shadow: 0 8px 20px rgba(28, 53, 35, 0.06);
  }

  .point-template-card {
    background: #ffffff;
    border-color: rgba(58, 142, 64, 0.18);
  }

  .point-template-card p {
    margin: 10px 0 0;
  }

  .preview-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .preview-list div {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    background: #fbfdfb;
  }

  .preview-list span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .preview-list strong {
    display: block;
    margin-top: 4px;
    color: var(--text);
    word-break: break-word;
  }

  .post-save-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .service-actions {
    margin-top: 4px;
  }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .client-summary { align-items: flex-start; flex-direction: column; }
    .admin-welcome { align-items: flex-start; flex-direction: column; }
    .form-grid { grid-template-columns: 1fr; }
    .admin-preview-grid { grid-template-columns: 1fr; }
    .admin-preview-grid .panel:first-child { grid-row: auto; }
    .visibility-item { flex-direction: column; }
    .edit-actions { flex-direction: column; }
    .inline-actions { justify-content: flex-start; }
    .service-hero { flex-direction: column; }
    .step-heading { flex-direction: column; }
    .preview-list { grid-template-columns: 1fr; }
  }

.cliente-content {
  width: 100%;
  max-width: 1180px;
  margin: 0 auto;
  display: grid;
  gap: 18px;
}

.cliente-panel-servicios {
  width: 100%;
}

.cliente-panel-servicios > h3 {
  color: #2A6D33;
  font-size: 22px;
  margin: 0 0 4px;
}

.cliente-panel-servicios > .list {
  margin-top: 0;
}

.cliente-dashboard-resumen {
  display: grid;
  grid-template-columns: repeat(5, minmax(140px, 1fr));
  gap: 14px;
  margin: 20px 0 22px;
}

.cliente-resumen-card {
  background: #ffffff;
  border: 1px solid rgba(58, 142, 64, 0.18);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 8px 24px rgba(42, 109, 51, 0.08);
}

.cliente-resumen-label {
  display: block;
  font-size: 12px;
  color: #5E7A63;
  margin-bottom: 8px;
  font-weight: 600;
}

.cliente-resumen-card strong {
  display: block;
  font-size: 24px;
  color: #2A6D33;
  line-height: 1.1;
}

.visitas-cliente-lista {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.visita-cliente-card {
  background: #ffffff;
  border: 1px solid rgba(58, 142, 64, 0.2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(42, 109, 51, 0.08);
}

.visita-cliente-header {
  width: 100%;
  border: 0;
  background: linear-gradient(135deg, #ffffff 0%, #f4fbf5 100%);
  display: flex;
  justify-content: space-between;
  gap: 18px;
  padding: 18px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}

.visita-cliente-header:hover {
  background: linear-gradient(135deg, #f8fff9 0%, #eef9f0 100%);
}

.visita-cliente-main {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

.visita-cliente-fecha {
  color: #3A8E40;
  font-size: 13px;
  font-weight: 700;
}

.visita-cliente-titulo {
  color: #1f2d22;
  font-size: 18px;
  line-height: 1.25;
}

.visita-cliente-subtitulo {
  color: #5E7A63;
  font-size: 14px;
}

.visita-cliente-metricas {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  min-width: 190px;
}

.estado-visita-badge,
.resultado-punto-badge {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 800;
}

.estado-ok,
.resultado-ok {
  background: rgba(79, 209, 89, 0.16);
  color: #2A6D33;
}

.estado-alerta,
.resultado-alerta {
  background: rgba(255, 193, 7, 0.18);
  color: #795500;
}

.estado-neutral,
.resultado-neutral {
  background: rgba(94, 122, 99, 0.13);
  color: #5E7A63;
}

.mini-progreso-cliente {
  width: 180px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  color: #5E7A63;
  font-size: 12px;
  font-weight: 700;
}

.mini-progreso-barra {
  width: 100%;
  height: 8px;
  background: #e8efe9;
  border-radius: 999px;
  overflow: hidden;
}

.mini-progreso-fill {
  height: 100%;
  background: linear-gradient(90deg, #3A8E40, #4FD159);
  border-radius: 999px;
}

.mini-progreso-cliente.sin-datos {
  align-items: flex-end;
}

.visita-cliente-puntos {
  color: #5E7A63;
  font-size: 12px;
  font-weight: 700;
}

.visita-cliente-toggle {
  color: #3A8E40;
  font-size: 13px;
  font-weight: 800;
}

.visita-cliente-detalle {
  border-top: 1px solid rgba(58, 142, 64, 0.16);
  padding: 18px;
  background: #ffffff;
}

.detalle-grid-cliente {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 14px;
}

.detalle-bloque-cliente {
  background: #f8fcf8;
  border: 1px solid rgba(58, 142, 64, 0.14);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 14px;
}

.detalle-bloque-cliente h4 {
  margin: 0 0 10px;
  color: #2A6D33;
  font-size: 16px;
}

.detalle-bloque-cliente p {
  margin: 6px 0;
  color: #2d3a30;
  line-height: 1.45;
}

.puntos-cliente-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(230px, 1fr));
  gap: 12px;
}

.punto-cliente-card {
  background: #ffffff;
  border: 1px solid rgba(58, 142, 64, 0.14);
  border-radius: 14px;
  padding: 13px;
}

.punto-cliente-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.punto-cliente-card p {
  font-size: 13px;
}

.documentos-cliente-lista,
.documentos-generales-cliente {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.documentos-generales-cliente {
  margin-top: 20px;
  background: #ffffff;
  border: 1px solid rgba(58, 142, 64, 0.18);
  border-radius: 18px;
  padding: 16px;
}

.documentos-generales-cliente h3 {
  margin: 0 0 12px;
  color: #2A6D33;
}

.documento-cliente-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: #f8fcf8;
  border: 1px solid rgba(58, 142, 64, 0.14);
  border-radius: 14px;
  padding: 12px;
}

.documento-cliente-item strong {
  display: block;
  color: #1f2d22;
}

.documento-cliente-item span,
.documento-cliente-item p {
  display: block;
  color: #5E7A63;
  font-size: 13px;
  margin: 4px 0 0;
}

.btn-documento-cliente {
  background: #3A8E40;
  color: #ffffff;
  text-decoration: none;
  border-radius: 999px;
  padding: 9px 13px;
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}

.btn-documento-cliente:hover {
  background: #2A6D33;
}

.loading-card,
.error-card,
.empty-state {
  background: #ffffff;
  border: 1px solid rgba(58, 142, 64, 0.16);
  border-radius: 16px;
  padding: 18px;
  color: #5E7A63;
  box-shadow: 0 8px 24px rgba(42, 109, 51, 0.06);
}

.error-card {
  border-color: rgba(180, 40, 40, 0.25);
  color: #8a1f1f;
  background: #fff7f7;
}

.empty-state.small {
  padding: 12px;
  font-size: 13px;
  box-shadow: none;
}

@media (max-width: 980px) {
  .cliente-dashboard-resumen {
    grid-template-columns: repeat(2, minmax(140px, 1fr));
  }

  .visita-cliente-header {
    flex-direction: column;
  }

  .visita-cliente-metricas {
    align-items: flex-start;
    min-width: 0;
  }

  .mini-progreso-cliente {
    width: 100%;
  }

  .detalle-grid-cliente,
  .puntos-cliente-grid {
    grid-template-columns: 1fr;
  }

  .documento-cliente-item {
    flex-direction: column;
    align-items: flex-start;
  }
}

@media (max-width: 520px) {
  .cliente-dashboard-resumen {
    grid-template-columns: 1fr;
  }
}
.visita-admin-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 0 18px 16px;
  background: #ffffff;
}

.visita-admin-actions .secondary-button {
  padding: 8px 12px;
  font-size: 12px;
}

.multi-text-block {
  border: 1px solid rgba(58, 142, 64, 0.16);
  border-radius: 16px;
  padding: 14px;
  margin: 14px 0;
  background: #fbfdfb;
}

.multi-text-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}

.multi-text-head h4 {
  margin: 0;
  color: #2A6D33;
}

.multi-text-head small {
  color: var(--muted);
  font-weight: 700;
}

.multi-option-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin: 10px 0 12px;
}

.multi-option-chip {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin: 0;
  padding: 9px 10px;
  border: 1px solid rgba(58, 142, 64, 0.18);
  border-radius: 12px;
  background: #ffffff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.35;
}

.multi-option-chip:has(input:checked) {
  border-color: #3A8E40;
  background: #f0fbf2;
  box-shadow: 0 8px 18px rgba(58, 142, 64, 0.10);
}

.multi-option-chip input {
  margin-top: 2px;
}

@media (max-width: 760px) {
  .multi-option-grid {
    grid-template-columns: 1fr;
  }
}
</style>
